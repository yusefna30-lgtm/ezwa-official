<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card: #0c0c0e; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding: 20px; }
        .brand { font-size: 3rem; color: var(--gold); margin: 30px 0; font-weight: 900; letter-spacing: 5px; }
        .container { max-width: 450px; margin: auto; background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid rgba(212,175,55,0.2); }
        .img-wrapper { width: 100%; height: 450px; border-radius: 20px; overflow: hidden; background: #1a1a1a; margin-bottom: 20px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .color-options { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid #333; transition: 0.3s; }
        .dot.active { border-color: var(--gold); transform: scale(1.1); }
        .price { font-size: 2.2rem; color: var(--gold); font-weight: bold; margin-bottom: 20px; }
        .btn { display: block; background: var(--gold); color: #000; padding: 18px; border-radius: 15px; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

    <div class="brand">EZWA</div>

    <div class="container">
        <div class="img-wrapper">
            <img id="mainImage" class="product-img" src="new%20tshirt%2001.jpg" alt="EZWA">
        </div>

        <div class="price">89 ر.س</div>

        <p>اختر الموديل:</p>
        <div class="color-options">
            <div class="dot active" style="background: #fff;" onclick="change('new%20tshirt%2001.jpg', this)"></div>
            
            <div class="dot" style="background: #333;" onclick="change('%D8%AA%D9%8A%D8%B4%D8%B1%D8%AA%20%D8%A8%D9%88%D9%83%D8%B3%20RAW.png', this)"></div>
            
            <div class="dot" style="background: #555;" onclick="change('%D8%AA%D9%8A%D8%B4%D8%B1%D8%AA%20%D8%A7%D9%88%D9%81%D8%B1%20%D8%B3%D8%A7%D9%8A%D8%B2.png', this)"></div>
        </div>

        <a href="https://wa.me/966502777884" class="btn">طلب عبر واتساب</a>
    </div>

    <script>
        function change(path, el) {
            document.getElementById('mainImage').src = path;
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }
    </script>

</body>
</html>
