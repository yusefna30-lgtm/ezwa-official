<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Store | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card: #0c0c0e; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: var(--white); text-align: center; margin: 0; padding: 10px; padding-bottom: 120px; }
        .brand { font-size: 2.5rem; color: var(--gold); margin: 25px 0; font-weight: 900; letter-spacing: 5px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1000px; margin: auto; }
        
        .card { 
            background: var(--card); padding: 12px; border-radius: 20px; 
            border: 1px solid rgba(212,175,55,0.15); display: flex; flex-direction: column; 
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .card:hover { border-color: var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); transform: translateY(-5px); }
        .img-wrapper { width: 100%; height: 230px; border-radius: 12px; overflow: hidden; background: #111; margin-bottom: 10px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; object-position: top; transition: transform 0.5s ease; }
        .card:hover .product-img { transform: scale(1.1); }

        .model-title { color: var(--gold); font-size: 0.9rem; font-weight: 700; margin-bottom: 5px; }
        .qty-box { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; background: #1a1a1a; padding: 5px; border-radius: 8px; }
        .qty-btn { background: #333; color: #fff; border: none; width: 28px; height: 28px; border-radius: 5px; cursor: pointer; }
        .qty-val { font-weight: bold; font-size: 1rem; color: var(--gold); min-width: 20px; }
        
        .color-options { display: flex; justify-content: center; gap: 6px; margin: 10px 0; flex-wrap: wrap; min-height: 25px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid #333; transition: 0.2s; }
        .dot.active { border-color: #fff; box-shadow: 0 0 8px var(--gold); transform: scale(1.15); }
        
        .add-btn { display: block; background: var(--gold); color: #000; padding: 10px; border-radius: 10px; font-weight: 900; font-size: 0.85rem; border: none; cursor: pointer; width: 100%; }

        .order-summary { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 2px solid var(--gold); padding: 15px; z-index: 100; display: none; }
        .summary-content { max-width: 1000px; margin: auto; display: flex; justify-content: space-between; align-items: center; }
        .final-btn { background: var(--gold); color: #000; padding: 12px 25px; border-radius: 10px; font-weight: 900; text-decoration: none; }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; } .img-wrapper { height: 400px; } }
    </style>
</head>
<body>

    <div class="brand">EZWA</div>

    <div class="grid">
        <div class="card">
            <div class="model-title">RAW Persist Pack</div>
            <div class="img-wrapper"><img id="img-raw" class="product-img" src="تيشرت بوكس RAW.png"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('qty-raw', -16, 16)">-</button>
                <div><span id="qty-raw" class="qty-val">16</span><div style="font-size:0.5rem; color:#666;">شدّة 16</div></div>
                <button class="qty-btn" onclick="changeQty('qty-raw', 16, 16)">+</button>
            </div>
            <div class="color-options">
                <div class="dot active" style="background:#e1c879;" onclick="updateDisplay('img-raw', 'تيشرت بوكس RAW.png', 'طقم كامل', this)"></div>
                <div class="dot" style="background:#2d4f3c;" onclick="updateDisplay('img-raw', 'تيشرت بوكس RAW (2).png', 'طقم كامل', this)"></div>
                <div class="dot" style="background:#111;" onclick="updateDisplay('img-raw', 'تيشرت بوكس RAW (3).png', 'طقم كامل', this)"></div>
                <div class="dot" style="background:#fff;" onclick="updateDisplay('img-raw', 'تيشرت بوكس RAW (4).png', 'طقم كامل', this)"></div>
            </div>
            <button class="add-btn" onclick="addToCart('بوكس RAW', 'طقم (4 ألوان)', 'qty-raw')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="model-title">RAW Distressed Cap</div>
            <div class="img-wrapper"><img id="img-cap" class="product-img" src="cap-01.jpeg"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('qty-cap', -12, 12)">-</button>
                <div><span id="qty-cap" class="qty-val">12</span><div style="font-size:0.5rem; color:#666;">درزن 12</div></div>
                <button class="qty-btn" onclick="changeQty('qty-cap', 12, 12)">+</button>
            </div>
            <div class="color-options">
                <div class="dot active" style="background:#3b4351;" onclick="updateDisplay('img-cap', 'cap-01.jpeg', 'كحلي', this, 'cap')"></div>
                <div class="dot" style="background:#2b2b2b;" onclick="updateDisplay('img-cap', 'cap-02.jpeg', 'أسود', this, 'cap')"></div>
                <div class="dot" style="background:#5a57d6;" onclick="updateDisplay('img-cap', 'cap-03.jpeg', 'أزرق', this, 'cap')"></div>
                <div class="dot" style="background:#8b4513;" onclick="updateDisplay('img-cap', 'cap-04.jpeg', 'بني', this, 'cap')"></div>
                <div class="dot" style="background:#4b5320;" onclick="updateDisplay('img-cap', 'cap-05.jpeg', 'زيتي', this, 'cap')"></div>
                <div class="dot" style="background:#708090;" onclick="updateDisplay('img-cap', 'cap-06.jpeg', 'رمادي', this, 'cap')"></div>
            </div>
            <button class="add-btn" onclick="addToCart('كاب RAW', currentCapColor, 'qty-cap')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="model-title">تيشيرت أوفر سايز سادة</div>
            <div class="img-wrapper"><img id="img-sada" class="product-img" src="sada02.png"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('qty-sada', -5, 5)">-</button>
                <div><span id="qty-sada" class="qty-val">5</span><div style="font-size:0.5rem; color:#666;">شدّة 5</div></div>
                <button class="qty-btn" onclick="changeQty('qty-sada', 5, 5)">+</button>
            </div>
            <div class="color-options">
                <div class="dot active" style="background:#005a43;" onclick="updateDisplay('img-sada', 'sada02.png', 'أخضر', this, 'sada')"></div>
                <div class="dot" style="background:#5a57d6;" onclick="updateDisplay('img-sada', 'sada01.png', 'أزرق', this, 'sada')"></div>
                <div class="dot" style="background:#e69b73;" onclick="updateDisplay('img-sada', 'sada03.png', 'مشمشي', this, 'sada')"></div>
            </div>
            <button class="add-btn" onclick="addToCart('تيشيرت سادة', currentSadaColor, 'qty-sada')">إضافة للطلب</button>
        </div>
    </div>

    <div id="cart-summary" class="order-summary">
        <div class="summary-content">
            <div id="order-count" style="color:var(--gold); font-size:0.9rem;">لديك طلبات جاهزة..</div>
            <a href="javascript:void(0)" class="final-btn" onclick="sendWhatsApp()">إرسال الطلب النهائي</a>
        </div>
    </div>

    <script>
        let currentCapColor = "كحلي";
        let currentSadaColor = "أخضر";
        let cart = [];

        function updateDisplay(imgId, src, name, el, type) {
            document.getElementById(imgId).src = src;
            const dots = el.parentElement.querySelectorAll('.dot');
            dots.forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            
            if(type === 'cap') currentCapColor = name;
            if(type === 'sada') currentSadaColor = name;
        }

        function changeQty(id, step, min) {
            const el = document.getElementById(id);
            let val = parseInt(el.innerText) + step;
            if (val < min) val = min;
            el.innerText = val;
        }

        function addToCart(name, info, qtyId) {
            const qty = document.getElementById(qtyId).innerText;
            cart.push({ name, info, qty });
            document.getElementById('cart-summary').style.display = 'block';
            document.getElementById('order-count').innerText = `تم إضافة ${cart.length} أصناف للطلب..`;
            alert(`تمت إضافة ${name} للطلب`);
        }

        function sendWhatsApp() {
            if (cart.length === 0) return;
            let msg = "أهلاً عزوة، طلب جملة جديد:\n\n";
            cart.forEach((item, i) => msg += `${i+1}. ${item.name} (${item.info}) - الكمية: ${item.qty} حبة\n`);
            window.location.href = `https://wa.me/966502777884?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
