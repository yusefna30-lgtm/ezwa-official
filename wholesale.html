<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Store | مبيعات الجملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card: #0c0c0e; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding: 20px; }
        .brand { font-size: 3rem; color: var(--gold); margin: 30px 0; font-weight: 900; letter-spacing: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; max-width: 1100px; margin: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid rgba(212,175,55,0.2); }
        .img-wrapper { width: 100%; height: 450px; border-radius: 20px; overflow: hidden; background: #1a1a1a; margin-bottom: 20px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .model-title { color: var(--gold); font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        .price { font-size: 2rem; color: #fff; font-weight: bold; margin-bottom: 20px; }
        .color-options { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid #333; transition: 0.3s; }
        .dot.active { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 10px var(--gold); }
        .btn { display: block; background: var(--gold); color: #000; padding: 18px; border-radius: 15px; text-decoration: none; font-weight: 700; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="brand">EZWA</div>

    <div class="grid">
        
        <div class="card">
            <div class="model-title">تيشيرت RAW Persist</div>
            <div class="img-wrapper">
                <img id="img-raw" class="product-img" src="تيشرت بوكس RAW.png">
            </div>
            <div class="price">89 ر.س</div>
            <div class="color-options">
                <div class="dot active" style="background: #e1c879;" onclick="update('img-raw', 'تيشرت بوكس RAW.png', this)"></div>
                <div class="dot" style="background: #2d4f3c;" onclick="update('img-raw', 'تيشرت بوكس RAW (2).png', this)"></div>
                <div class="dot" style="background: #111;" onclick="update('img-raw', 'تيشرت بوكس RAW (3).png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="update('img-raw', 'تيشرت بوكس RAW (4).png', this)"></div>
            </div>
            <a href="https://wa.me/966502777884" class="btn">طلب موديل RAW</a>
        </div>

        <div class="card">
            <div class="model-title">تيشيرت أوفر سايز سادة</div>
            <div class="img-wrapper">
                <img id="img-sada" class="product-img" src="sada03.png">
            </div>
            <div class="price">89 ر.س</div>
            <div class="color-options">
                <div class="dot active" style="background: #e69b73;" onclick="update('img-sada', 'sada03.png', this)"></div>
                <div class="dot" style="background: #5a57d6;" onclick="update('img-sada', 'sada01.png', this)"></div>
                <div class="dot" style="background: #005a43;" onclick="update('img-sada', 'sada02.png', this)"></div>
            </div>
            <a href="https://wa.me/966502777884" class="btn">طلب موديل سادة</a>
        </div>

    </div>

    <script>
        function update(id, src, el) {
            document.getElementById(id).src = src;
            const dots = el.parentElement.querySelectorAll('.dot');
            dots.forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }
    </script>

</body>
</html>
