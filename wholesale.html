<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Store | Wholesale Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card: #0c0c0e; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: var(--white); text-align: center; margin: 0; padding: 10px; padding-bottom: 120px; }
        
        .brand { font-size: 2.5rem; color: var(--gold); margin: 25px 0; font-weight: 900; letter-spacing: 5px; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1000px; margin: auto; }
        
        .card { 
            background: var(--card); padding: 12px; border-radius: 20px; 
            border: 1px solid rgba(212,175,55,0.15); display: flex; flex-direction: column; 
            transition: 0.3s;
        }

        .img-wrapper { width: 100%; height: 230px; border-radius: 12px; overflow: hidden; background: #111; margin-bottom: 10px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; object-position: top; }

        .model-title { color: var(--gold); font-size: 0.95rem; font-weight: 700; margin-bottom: 5px; }
        .price { font-size: 1.1rem; font-weight: 900; margin-bottom: 10px; }

        /* عداد الكمية */
        .qty-box { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; background: #1a1a1a; padding: 5px; border-radius: 8px; }
        .qty-btn { background: #333; color: #fff; border: none; width: 28px; height: 28px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .qty-val { font-weight: bold; font-size: 1rem; color: var(--gold); min-width: 25px; }

        .color-options { display: flex; justify-content: center; gap: 8px; margin: 12px 0; }
        .dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid #333; }
        .dot.active { border-color: var(--white); transform: scale(1.15); box-shadow: 0 0 10px var(--gold); }

        .add-btn { 
            display: block; background: var(--gold); color: #000; padding: 10px; 
            border-radius: 10px; text-decoration: none; font-weight: 900; font-size: 0.85rem; 
            border: none; cursor: pointer; width: 100%;
        }

        /* سلة الطلبات العائمة */
        .order-summary { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #111; border-top: 2px solid var(--gold); 
            padding: 15px; z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            display: none; /* تظهر فقط عند إضافة منتج */
        }
        .summary-content { max-width: 1000px; margin: auto; display: flex; justify-content: space-between; align-items: center; }
        .order-list-text { font-size: 0.85rem; color: var(--gold); text-align: right; }
        .final-btn { background: var(--gold); color: #000; padding: 12px 25px; border-radius: 10px; font-weight: 900; text-decoration: none; }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
            .img-wrapper { height: 400px; }
            .brand { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div class="brand">EZWA</div>

    <div class="grid">
        
        <div class="card">
            <div style="font-size: 0.7rem; color: #888; margin-bottom: 5px;">تشكيلة البراند الكاملة</div>
            <div class="model-title">بوكس RAW المتكامل</div>
            <div class="img-wrapper"><img id="img-raw" class="product-img" src="تيشرت بوكس RAW.png"></div>
            <div class="price">89 ر.س</div>
            
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('qty-raw', -16, 16)">-</button>
                <div><span id="qty-raw" class="qty-val">16</span><div style="font-size:0.6rem; color:#666;">شدّة 16</div></div>
                <button class="qty-btn" onclick="changeQty('qty-raw', 16, 16)">+</button>
            </div>

            <div class="color-options">
                <div class="dot active" style="background: #e1c879;" onclick="updateImg('img-raw', 'تيشرت بوكس RAW.png', this)"></div>
                <div class="dot" style="background: #2d4f3c;" onclick="updateImg('img-raw', 'تيشرت بوكس RAW (2).png', this)"></div>
                <div class="dot" style="background: #111;" onclick="updateImg('img-raw', 'تيشرت بوكس RAW (3).png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="updateImg('img-raw', 'تيشرت بوكس RAW (4).png', this)"></div>
            </div>
            
            <button class="add-btn" onclick="addToOrder('بوكس RAW (4 ألوان)', 'مشكّل', 'qty-raw')">إضافة البوكس للطلب</button>
        </div>

        <div class="card">
            <div style="font-size: 0.7rem; color: #888; margin-bottom: 5px;">ألوان أوفر سايز سادة</div>
            <div class="model-title">تيشيرت أوفر سايز</div>
            <div class="img-wrapper"><img id="img-sada" class="product-img" src="sada02.png"></div>
            <div class="price">89 ر.س</div>

            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('qty-sada', -5, 5)">-</button>
                <div><span id="qty-sada" class="qty-val">5</span><div style="font-size:0.6rem; color:#666;">شدّة 5</div></div>
                <button class="qty-btn" onclick="changeQty('qty-sada', 5, 5)">+</button>
            </div>

            <div class="color-options">
                <div class="dot active" data-name="أخضر" style="background: #005a43;" onclick="selectSada('img-sada', 'sada02.png', 'أخضر', this)"></div>
                <div class="dot" data-name="أزرق" style="background: #5a57d6;" onclick="selectSada('img-sada', 'sada01.png', 'أزرق', this)"></div>
                <div class="dot" data-name="مشمشي" style="background: #e69b73;" onclick="selectSada('img-sada', 'sada03.png', 'مشمشي', this)"></div>
            </div>
            
            <button class="add-btn" onclick="addToOrder('تيشيرت سادة', currentSadaColor, 'qty-sada')">إضافة اللون للطلب</button>
        </div>

    </div>

    <div id="cart-summary" class="order-summary">
        <div class="summary-content">
            <div class="order-list-text" id="order-list">لقد أضفت (0) منتجات</div>
            <a href="javascript:void(0)" class="final-btn" onclick="sendToWhatsApp()">إرسال الطلب بالكامل</a>
        </div>
    </div>

    <script>
        let currentSadaColor = "أخضر";
        let cart = [];

        function updateImg(id, src, el) {
            document.getElementById(id).src = src;
            const dots = el.parentElement.querySelectorAll('.dot');
            dots.forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function selectSada(id, src, colorName, el) {
            updateImg(id, src, el);
            currentSadaColor = colorName;
        }

        function changeQty(id, step, min) {
            const el = document.getElementById(id);
            let val = parseInt(el.innerText);
            val += step;
            if (val < min) val = min;
            el.innerText = val;
        }

        function addToOrder(name, color, qtyId) {
            const qty = document.getElementById(qtyId).innerText;
            cart.push({ name, color, qty });
            
            // تحديث الواجهة
            document.getElementById('cart-summary').style.display = 'block';
            document.getElementById('order-list').innerText = `تم إضافة ${cart.length} أصناف للطلب..`;
            
            // تأثير بصري بسيط
            alert(`تمت إضافة ${name} (${color}) للطلب بنجاح!`);
        }

        function sendToWhatsApp() {
            if (cart.length === 0) return;

            let message = "أهلاً عزوة، أرغب في تقديم طلب جملة:\n\n";
            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.name} | لون: ${item.color} | كمية: ${item.qty} حبة\n`;
            });
            message += "\nبانتظار تأكيد التوفر وبقية التفاصيل.";

            window.location.href = `https://wa.me/966502777884?text=${encodeURIComponent(message)}`;
        }
    </script>

</body>
</html>
