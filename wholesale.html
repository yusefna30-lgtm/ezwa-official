<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Store | مبيعات الجملة</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #D4AF37; 
            --black: #000; 
            --card-bg: #0c0c0e; 
            --transition: all 0.3s ease;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--black); 
            color: #fff; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }

        .brand { 
            font-size: 3.5rem; 
            color: var(--gold); 
            margin: 40px 0; 
            font-weight: 900; 
            letter-spacing: 8px; 
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 40px; 
            max-width: 1200px; 
            margin: auto; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 30px; 
            border: 1px solid rgba(212, 175, 55, 0.1); 
            transition: var(--transition);
        }

        .card:hover {
            border-color: var(--gold);
            transform: translateY(-10px);
        }

        .img-wrapper { 
            width: 100%; 
            height: 480px; 
            border-radius: 20px; 
            overflow: hidden; 
            background: #111; 
            margin-bottom: 20px; 
        }

        .product-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: opacity 0.4s ease; 
        }

        .model-title { 
            color: var(--gold); 
            font-size: 1.6rem; 
            font-weight: 700; 
            margin-bottom: 10px; 
        }

        .price { 
            font-size: 2rem; 
            font-weight: 900; 
            margin-bottom: 20px; 
        }

        .color-options { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin: 20px 0; 
        }

        .dot { 
            width: 38px; 
            height: 38px; 
            border-radius: 50%; 
            cursor: pointer; 
            border: 3px solid #333; 
            transition: var(--transition);
        }

        .dot:hover { transform: scale(1.2); }

        .dot.active { 
            border-color: var(--gold); 
            transform: scale(1.15); 
            box-shadow: 0 0 15px var(--gold); 
        }

        .btn { 
            display: block; 
            background: var(--gold); 
            color: #000; 
            padding: 18px; 
            border-radius: 15px; 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 1.2rem; 
            transition: var(--transition);
        }

        .btn:hover { 
            background: #fff; 
            transform: scale(1.02); 
        }

        p { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="brand">EZWA</div>

    <div class="grid">
        
        <div class="card">
            <div class="model-title">تيشيرت RAW Persist</div>
            <div class="img-wrapper">
                <img id="img-raw" class="product-img" src="تيشرت بوكس RAW.png" alt="RAW Model">
            </div>
            <div class="price">89 ر.س</div>
            <p>اختر اللون:</p>
            <div class="color-options">
                <div class="dot active" style="background: #e1c879;" onclick="update('img-raw', 'تيشرت بوكس RAW.png', this)"></div>
                <div class="dot" style="background: #2d4f3c;" onclick="update('img-raw', 'تيشرت بوكس RAW (2).png', this)"></div>
                <div class="dot" style="background: #111;" onclick="update('img-raw', 'تيشرت بوكس RAW (3).png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="update('img-raw', 'تيشرت بوكس RAW (4).png', this)"></div>
            </div>
            <a href="https://wa.me/966502777884" class="btn">اطلب موديل RAW</a>
        </div>

        <div class="card">
            <div class="model-title">تيشيرت أوفر سايز سادة</div>
            <div class="img-wrapper">
                <img id="img-sada" class="product-img" src="sada03.png" alt="Sada Model" onerror="this.src='https://via.placeholder.com/400x500/111/D4AF37?text=EZWA+IMAGE'">
            </div>
            <div class="price">89 ر.س</div>
            <p>اختر اللون:</p>
            <div class="color-options">
                <div class="dot active" style="background: #e69b73;" onclick="update('img-sada', 'sada03.png', this)"></div>
                <div class="dot" style="background: #5a57d6;" onclick="update('img-sada', 'sada01.png', this)"></div>
                <div class="dot" style="background: #005a43;" onclick="update('img-sada', 'sada02.png', this)"></div>
            </div>
            <a href="https://wa.me/966502777884" class="btn">اطلب موديل سادة</a>
        </div>

    </div>

    <script>
        // دالة تبديل الصور الذكية
        function update(id, src, el) {
            const img = document.getElementById(id);
            
            // إضافة تأثير اختفاء بسيط لجعل التبديل احترافياً
            img.style.opacity = '0'; 
            
            setTimeout(() => {
                img.src = src;
                img.style.opacity = '1';
            }, 200);

            // تحديث الدائرة النشطة
            const parent = el.parentElement;
            parent.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }
    </script>

</body>
</html>
