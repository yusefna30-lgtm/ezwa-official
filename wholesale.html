<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Store | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card: #0c0c0e; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding: 10px; }
        
        .brand { font-size: 2.2rem; color: var(--gold); margin: 25px 0; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1000px; margin: auto; }

        .card { 
            background: var(--card); 
            padding: 12px; 
            border-radius: 20px; 
            border: 1px solid rgba(212,175,55,0.15); 
            position: relative;
            transition: all 0.4s ease;
            display: flex; flex-direction: column;
        }

        /* تأثير التوهج الذهبي عند التمرير */
        .card:hover { 
            border-color: var(--gold); 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            transform: translateY(-5px);
        }

        /* شارة "جملة" */
        .badge {
            position: absolute; top: 15px; right: 15px;
            background: var(--gold); color: #000;
            font-size: 0.65rem; font-weight: 900;
            padding: 3px 8px; border-radius: 5px; z-index: 10;
        }

        .img-wrapper { 
            width: 100%; height: 230px; border-radius: 12px; 
            overflow: hidden; background: #111; margin-bottom: 12px; 
        }

        .product-img { width: 100%; height: 100%; object-fit: cover; object-position: top; transition: 0.5s ease; }

        .model-title { color: var(--gold); font-size: 0.9rem; font-weight: 700; margin-bottom: 5px; }
        .price { font-size: 1.2rem; font-weight: 900; margin-bottom: 12px; color: #fff; }

        .color-options { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid #222; transition: 0.3s; }
        .dot.active { border-color: var(--gold); transform: scale(1.2); }

        .btn { 
            display: block; background: var(--gold); color: #000; padding: 10px; 
            border-radius: 10px; text-decoration: none; font-weight: 900; font-size: 0.85rem; 
            transition: 0.3s;
        }
        .btn:hover { background: #fff; transform: scale(1.03); }

        /* الشاشات الكبيرة */
        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
            .img-wrapper { height: 400px; }
            .brand { font-size: 3.5rem; }
            .model-title { font-size: 1.4rem; }
            .price { font-size: 1.8rem; }
            .dot { width: 32px; height: 32px; }
            .btn { font-size: 1.1rem; padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="brand">EZWA</div>

    <div class="grid">
        
        <div class="card">
            <div class="badge">WHOLESALE</div>
            <div class="model-title">RAW Persist</div>
            <div class="img-wrapper">
                <img id="img-raw" class="product-img" src="تيشرت بوكس RAW.png">
            </div>
            <div class="price">89 ر.س</div>
            <div class="color-options">
                <div class="dot active" style="background: #e1c879;" onclick="update('img-raw', 'تيشرت بوكس RAW.png', this)"></div>
                <div class="dot" style="background: #2d4f3c;" onclick="update('img-raw', 'تيشرت بوكس RAW (2).png', this)"></div>
                <div class="dot" style="background: #111;" onclick="update('img-raw', 'تيشرت بوكس RAW (3).png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="update('img-raw', 'تيشرت بوكس RAW (4).png', this)"></div>
            </div>
            <a href="https://wa.me/966502777884?text=أهلاً%20عزوة،%20أرغب%20في%20الاستفسار%20عن%20جملة%20موديل%20RAW" class="btn">طلب الجملة</a>
        </div>

        <div class="card">
            <div class="badge">BEST SELLER</div>
            <div class="model-title">Oversize Plain</div>
            <div class="img-wrapper">
                <img id="img-sada" class="product-img" src="sada02.png">
            </div>
            <div class="price">89 ر.س</div>
            <div class="color-options">
                <div class="dot active" style="background: #005a43;" onclick="update('img-sada', 'sada02.png', this)"></div>
                <div class="dot" style="background: #5a57d6;" onclick="update('img-sada', 'sada01.png', this)"></div>
                <div class="dot" style="background: #e69b73;" onclick="update('img-sada', 'sada03.png', this)"></div>
            </div>
            <a href="https://wa.me/966502777884?text=أهلاً%20عزوة،%20أرغب%20في%20الاستفسار%20عن%20جملة%20موديل%20السادة" class="btn">طلب الجملة</a>
        </div>

    </div>

    <script>
        function update(id, src, el) {
            const img = document.getElementById(id);
            img.style.opacity = '0.6';
            setTimeout(() => {
                img.src = src;
                img.style.opacity = '1';
            }, 150);
            
            const dots = el.parentElement.querySelectorAll('.dot');
            dots.forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }
    </script>

</body>
</html>
