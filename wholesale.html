<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Store | مبيعات الجملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card: #0c0c0e; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding: 20px; }
        .brand { font-size: 3rem; color: var(--gold); margin: 40px 0; font-weight: 900; letter-spacing: 5px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; max-width: 1100px; margin: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid rgba(212,175,55,0.2); }
        
        .img-wrapper { width: 100%; height: 450px; border-radius: 20px; overflow: hidden; background: #1a1a1a; margin-bottom: 15px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        
        .model-title { color: var(--gold); font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        .price { font-size: 1.8rem; margin-bottom: 15px; font-weight: bold; }
        
        .color-options { display: flex; justify-content: center; gap: 12px; margin: 15px 0; }
        .dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid #333; transition: 0.3s; }
        .dot.active { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 10px var(--gold); }
        
        .btn { display: block; background: var(--gold); color: #000; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 700; margin-top: 15px; transition: 0.3s; }
        .btn:hover { background: #fff; }
    </style>
</head>
<body>

    <div class="brand">EZWA</div>

    <div class="grid">
        
        <div class="card" id="raw-section">
            <div class="model-title">تيشيرت RAW Persist</div>
            <div class="img-wrapper">
                <img id="img-raw" class="product-img" src="%D8%AA%D9%8A%D8%B4%D8%B1%D8%AA%20%D8%A8%D9%88%D9%83%D8%B3%20RAW.png">
            </div>
            <div class="price">89 ر.س</div>
            <div class="color-options">
                <div class="dot active" style="background: #e1c879;" onclick="updateImg('img-raw', '%D8%AA%D9%8A%D8%B4%D8%B1%D8%AA%20%D8%A8%D9%88%D9%83%D8%B3%20RAW.png', this)"></div>
                <div class="dot" style="background: #2d4f3c;" onclick="updateImg('img-raw', '%D8%AA%D9%8A%D8%B4%D8%B1%D8%AA%20%D8%A8%D9%88%D9%83%D8%B3%20RAW%20(2).png', this)"></div>
                <div class="dot" style="background: #111;" onclick="updateImg('img-raw', '%D8%AA%D9%8A%D8%B4%D8%B1%D8%AA%20%D8%A8%D9%88%D9%83%D8%B3%20RAW%20(3).png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="updateImg('img-raw', '%D8%AA%D9%8A%D8%B4%D8%B1%D8%AA%20%D8%A8%D9%88%D9%83%D8%B3%20RAW%20(4).png', this)"></div>
            </div>
            <a href="https://wa.me/966502777884" class="btn">اطلب موديل RAW</a>
        </div>

        <div class="card" id="oversize-section">
            <div class="model-title">تيشيرت أوفر سايز سادة</div>
            <div class="img-wrapper">
                <img id="img-ov" class="product-img" src="1779469729927-019e50a8-00b6-736f-ab49-05a4186b83dc.png">
            </div>
            <div class="price">89 ر.س</div>
            <div class="color-options">
                <div class="dot active" style="background: #e69b73;" onclick="updateImg('img-ov', '1779469729927-019e50a8-00b6-736f-ab49-05a4186b83dc.png', this)"></div>
                <div class="dot" style="background: #5a57d6;" onclick="updateImg('img-ov', '1779469095596-019e509e-b4c9-777d-b254-993059f3bca6.png', this)"></div>
                <div class="dot" style="background: #005a43;" onclick="updateImg('img-ov', '1779469233634-019e50a0-8c96-7479-92f3-fba08409f549.png', this)"></div>
            </div>
            <a href="https://wa.me/966502777884" class="btn">اطلب السادة</a>
        </div>

    </div>

    <script>
        function updateImg(imgId, newSrc, element) {
            const img = document.getElementById(imgId);
            img.style.opacity = '0.4';
            setTimeout(() => {
                img.src = newSrc;
                img.style.opacity = '1';
            }, 150);
            
            // تحديث الدائرة النشطة في نفس القسم فقط
            const parent = element.parentElement;
            parent.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            element.classList.add('active');
        }
    </script>

</body>
</html>
