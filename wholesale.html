<div id="ezwa-store-section">
    <style>
        /* تنسيقات الهوية والبنية التحتية */
        #ezwa-store-section { background: #000; color: #fff; font-family: 'Cairo', sans-serif; padding: 40px 20px; direction: rtl; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        
        /* تصميم كارت المنتج */
        .p-card { background: #0c0c0e; border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; transition: 0.4s; text-align: center; }
        .p-card:hover { border-color: #dfb43f; transform: translateY(-5px); }
        
        /* حاوية الصورة والزوم */
        .p-img-box { width: 100%; aspect-ratio: 1/1; overflow: hidden; border-radius: 10px; background: #151518; margin-bottom: 15px; }
        .p-img-box img { width: 100%; height: 100%; object-fit: contain; transition: 0.6s; cursor: zoom-in; }
        .p-img-box:hover img { transform: scale(1.2); }
        
        /* أزرار الألوان */
        .swatches { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .swatch { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid #333; transition: 0.3s; }
        .swatch.active { border-color: #dfb43f; transform: scale(1.2); }
        
        .p-name { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; letter-spacing: 1px; }
        .p-price { color: #dfb43f; font-size: 0.9rem; font-weight: bold; }
    </style>

    <div class="product-grid">
        <div class="p-card">
            <div class="p-img-box">
                <img src="تيشرت بوكس RAW (3).png" id="img-raw">
            </div>
            <div class="p-name">سلسلة RAW - PERSIST</div>
            <div class="p-price">249 ريال سعودي</div>
            <div class="swatches">
                <div class="swatch active" style="background:#000" onclick="updateP('img-raw', 'تيشرت بوكس RAW (3).png', this)"></div>
                <div class="swatch" style="background:#1b4d3e" onclick="updateP('img-raw', 'تيشرت بوكس RAW (2).png', this)"></div>
                <div class="swatch" style="background:#fff" onclick="updateP('img-raw', 'تيشرت بوكس RAW (4).png', this)"></div>
                <div class="swatch" style="background:#f3e5ab" onclick="updateP('img-raw', 'تيشرت بوكس RAW.png', this)"></div>
            </div>
        </div>

        <div class="p-card">
            <div class="p-img-box"><img src="87a0ca0a-64b2-4b2f-9abd-b0442b471d5e_aZiEtjGkf.jpg"></div>
            <div class="p-name">MOMENT BACKPRINT</div>
            <div class="p-price">259 ريال سعودي</div>
        </div>

        <div class="p-card">
            <div class="p-img-box"><img src="1779118253452-019e50a5-3f3b-7339-8433-dbc6310d5380.png"></div>
            <div class="p-name">ARTISTIC FACE TEE</div>
            <div class="p-price">269 ريال سعودي</div>
        </div>

        <div class="p-card">
            <div class="p-img-box"><img src="Gemini_Generated_Image_2d2ny92d2ny92d2n.png"></div>
            <div class="p-name">BEIGE HOOD PRINT</div>
            <div class="p-price">249 ريال سعودي</div>
        </div>

        </div>

    <script>
        function updateP(imgId, newSrc, el) {
            // تغيير الصورة
            document.getElementById(imgId).src = newSrc;
            // تحديث الأزرار
            const parent = el.parentElement;
            parent.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</div>
