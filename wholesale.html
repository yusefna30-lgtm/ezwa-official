<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA | مبيعات الجملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --black: #000000;
            --card-bg: #0c0c0e;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--black); 
            color: #fff; 
            margin: 0; 
            padding: 20px; 
        }

        .brand { font-size: 3.5rem; color: var(--gold); text-align: center; margin: 40px 0; font-weight: 900; letter-spacing: 8px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; max-width: 1100px; margin: auto; }

        .card { 
            background: var(--card-bg); 
            border: 1px solid rgba(212, 175, 55, 0.1); 
            border-radius: 30px; 
            padding: 25px; 
            transition: var(--transition);
            text-align: center;
        }

        /* حاوية الصورة مع تأثير الانتقال */
        .image-container {
            width: 100%;
            height: 400px;
            overflow: hidden;
            border-radius: 20px;
            margin-bottom: 20px;
            background: #111;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        /* خيارات الألوان */
        .color-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .color-option:hover { transform: scale(1.2); }
        .color-option.active { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 10px var(--gold); }

        .price { color: var(--gold); font-size: 2rem; font-weight: 700; margin-bottom: 20px; }

        .btn { 
            display: block; 
            background: var(--gold); 
            color: #000; 
            padding: 15px; 
            border-radius: 15px; 
            text-decoration: none; 
            font-weight: 700; 
            transition: var(--transition);
        }

        .btn:hover { background: #fff; transform: translateY(-3px); }
    </style>
</head>
<body>

    <div class="brand">EZWA</div>

    <div class="grid">
        <div class="card">
            <div class="image-container">
                <img id="product-img" src="https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/persist-white.JPG" alt="EZWA T-Shirt">
            </div>

            <div class="price">89 ر.س</div>

            <p>اختر اللون المفضل:</p>
            <div class="color-selector">
                <div class="color-option active" style="background: #ffffff;" 
                     onclick="updateProduct('https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/persist-white.JPG', this)"></div>
                
                <div class="color-option" style="background: #222;" 
                     onclick="updateProduct('رابط_صورة_الأسود', this)"></div>
                
                <div class="color-option" style="background: #1a2e1a;" 
                     onclick="updateProduct('رابط_صورة_الزيتي', this)"></div>
                
                <div class="color-option" style="background: #2c3e50;" 
                     onclick="updateProduct('رابط_صورة_الكحلي', this)"></div>
            </div>

            <a href="https://wa.me/966502777884" class="btn">اطلب الموديل الآن</a>
        </div>
    </div>

    <script>
        function updateProduct(imageUrl, element) {
            const mainImg = document.getElementById('product-img');
            
            // إضافة تأثير اختفاء بسيط قبل التغيير
            mainImg.style.opacity = '0.5';
            mainImg.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                mainImg.src = imageUrl;
                mainImg.style.opacity = '1';
                mainImg.style.transform = 'scale(1)';
            }, 200);

            // تحديث الدائرة النشطة
            const options = document.querySelectorAll('.color-option');
            options.forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
        }
    </script>

</body>
</html>
