<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA | مبيعات الجملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --black: #000000;
            --card-bg: #0c0c0e;
        }

        body { font-family: 'Cairo', sans-serif; background-color: var(--black); color: #fff; text-align: center; padding: 20px; margin: 0; }
        .brand { font-size: 3rem; color: var(--gold); margin: 30px 0; font-weight: 900; letter-spacing: 5px; }

        .card { 
            background: var(--card-bg); 
            max-width: 450px; 
            margin: auto; 
            border-radius: 30px; 
            padding: 25px; 
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .img-box { 
            width: 100%; height: 450px; border-radius: 20px; overflow: hidden; background: #111; margin-bottom: 20px;
        }

        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }

        .price { color: var(--gold); font-size: 2.2rem; font-weight: 700; margin: 15px 0; }

        .selectors { margin: 20px 0; }
        .color-dots { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        
        .dot { 
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer; 
            border: 3px solid transparent; transition: 0.3s; 
        }
        .dot.active { border-color: var(--gold); transform: scale(1.1); }

        select { 
            background: #1a1a1a; color: #fff; border: 1px solid var(--gold); 
            padding: 10px; border-radius: 10px; font-family: 'Cairo'; width: 80%; font-size: 1rem;
        }

        .btn { 
            display: block; background: var(--gold); color: #000; padding: 18px; 
            border-radius: 15px; text-decoration: none; font-weight: 700; font-size: 1.2rem; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="brand">EZWA</div>

    <div class="card">
        <div class="img-box">
            <img id="main-img" src="https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/persist-white.JPG" alt="EZWA">
        </div>

        <div class="price">89 ر.س</div>

        <div class="selectors">
            <p>اختر اللون والمقاس:</p>
            <div class="color-dots">
                <div class="dot active" style="background: #ffffff;" onclick="update('https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/persist-white.JPG', 'أبيض', this)"></div>
                <div class="dot" style="background: #000;" onclick="update('https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/TSHIRT%20BOX%20RAW.png', 'أسود', this)"></div>
            </div>

            <select id="size-select">
                <option value="S">مقاس S</option>
                <option value="M">مقاس M</option>
                <option value="L">مقاس L</option>
                <option value="XL">مقاس XL</option>
            </select>
        </div>

        <a href="#" id="wa-btn" class="btn" onclick="sendToWhatsApp()">اطلب الآن عبر واتساب</a>
    </div>

    <script>
        let selectedColor = "أبيض";

        function update(imgUrl, colorName, el) {
            document.getElementById('main-img').src = imgUrl;
            selectedColor = colorName;
            
            // تحديث الدائرة النشطة
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function sendToWhatsApp() {
            const size = document.getElementById('size-select').value;
            const message = `أهلاً عزوة، أرغب في طلب:\n- تيشيرت Persist\n- اللون: ${selectedColor}\n- المقاس: ${size}`;
            const encodedMessage = encodeURIComponent(message);
            window.location.href = `https://wa.me/966502777884?text=${encodedMessage}`;
        }
    </script>

</body>
</html>
