<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Store | مبيعات الجملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card: #0c0c0e; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding: 10px; }
        .brand { font-size: 2rem; color: var(--gold); margin: 20px 0; font-weight: 900; letter-spacing: 3px; }
        
        /* الشبكة: تعرض منتجين بجانب بعضهما حتى في الشاشات الصغيرة جداً */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* إجبار عرض عنصرين في الصف الواحد */
            gap: 10px; 
            max-width: 1000px; 
            margin: auto; 
        }

        .card { 
            background: var(--card); 
            padding: 10px; 
            border-radius: 15px; 
            border: 1px solid rgba(212,175,55,0.1); 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* تصغير الارتفاع ليتناسب مع العرض الصغير */
        .img-wrapper { 
            width: 100%; 
            height: 220px; 
            border-radius: 10px; 
            overflow: hidden; 
            background: #1a1a1a; 
            margin-bottom: 10px; 
        }

        .product-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: top;
        }

        .model-title { color: var(--gold); font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; }
        .price { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; }

        .color-options { display: flex; justify-content: center; gap: 6px; margin: 10px 0; }
        .dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 1.5px solid #333; }
        .dot.active { border-color: var(--gold); transform: scale(1.1); }

        .btn { 
            display: block; 
            background: var(--gold); 
            color: #000; 
            padding: 8px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 0.8rem; 
        }

        /* تعديلات للشاشات الكبيرة (الكمبيوتر) */
        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
            .img-wrapper { height: 380px; }
            .model-title { font-size: 1.2rem; }
            .price { font-size: 1.6rem; }
            .dot { width: 30px; height: 30px; }
            .btn { font-size: 1rem; padding: 14px; }
            .brand { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="brand">EZWA</div>

    <div class="grid">
        
        <div class="card">
            <div class="model-title">RAW Persist</div>
            <div class="img-wrapper">
                <img id="img-raw" class="product-img" src="تيشرت بوكس RAW.png">
            </div>
            <div class="price">89 ر.س</div>
            <div class="color-options">
                <div class="dot active" style="background: #e1c879;" onclick="update('img-raw', 'تيشرت بوكس RAW.png', this)"></div>
                <div class="dot" style="background: #2d4f3c;" onclick="update('img-raw', 'تيشرت بوكس RAW (2).png', this)"></div>
                <div class="dot" style="background: #111;" onclick="update('img-raw', 'تيشرت بوكس RAW (3).png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="update('img-raw', 'تيشرت بوكس RAW (4).png', this)"></div>
            </div>
            <a href="https://wa.me/966502777884?text=طلب%20موديل%20RAW" class="btn">طلب واتساب</a>
        </div>

        <div class="card">
            <div class="model-title">أوفر سايز سادة</div>
            <div class="img-wrapper">
                <img id="img-sada" class="product-img" src="sada02.png">
            </div>
            <div class="price">89 ر.س</div>
            <div class="color-options">
                <div class="dot active" style="background: #005a43;" onclick="update('img-sada', 'sada02.png', this)"></div>
                <div class="dot" style="background: #5a57d6;" onclick="update('img-sada', 'sada01.png', this)"></div>
                <div class="dot" style="background: #e69b73;" onclick="update('img-sada', 'sada03.png', this)"></div>
            </div>
            <a href="https://wa.me/966502777884?text=طلب%20موديل%20سادة" class="btn">طلب واتساب</a>
        </div>

    </div>

    <script>
        function update(id, src, el) {
            document.getElementById(id).src = src;
            const dots = el.parentElement.querySelectorAll('.dot');
            dots.forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }
    </script>

</body>
</html>
