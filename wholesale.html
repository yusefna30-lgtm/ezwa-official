<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Store | مبيعات الجملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card: #0c0c0e; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding: 20px; }
        .brand { font-size: 2.5rem; color: var(--gold); margin: 30px 0; font-weight: 900; letter-spacing: 5px; }
        
        /* تحسين شبكة العرض لتكون البطاقات أصغر وأكثر تناسقاً */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1000px; 
            margin: auto; 
        }

        .card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 25px; 
            border: 1px solid rgba(212,175,55,0.1); 
            transition: 0.3s; 
        }

        .card:hover { transform: translateY(-5px); border-color: var(--gold); }

        /* تصغير حجم إطار الصورة */
        .img-wrapper { 
            width: 100%; 
            height: 380px; /* تم تصغير الارتفاع هنا */
            border-radius: 15px; 
            overflow: hidden; 
            background: #1a1a1a; 
            margin-bottom: 15px; 
        }

        .product-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: top; /* التركيز على الجزء العلوي من الصورة */
            transition: 0.4s ease; 
        }

        .model-title { color: var(--gold); font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; }
        .price { font-size: 1.6rem; font-weight: bold; margin-bottom: 15px; }

        .color-options { display: flex; justify-content: center; gap: 12px; margin: 15px 0; }
        .dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #333; transition: 0.3s; }
        .dot.active { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 8px var(--gold); }

        .btn { 
            display: block; 
            background: var(--gold); 
            color: #000; 
            padding: 14px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 1rem; 
            transition: 0.3s; 
        }
        .btn:hover { background: #fff; }
    </style>
</head>
<body>

    <div class="brand">EZWA</div>

    <div class="grid">
        
        <div class="card">
            <div class="model-title">تيشيرت RAW Persist</div>
            <div class="img-wrapper">
                <img id="img-raw" class="product-img" src="تيشرت بوكس RAW.png">
            </div>
            <div class="price">89 ر.س</div>
            <div class="color-options">
                <div class="dot active" style="background: #e1c879;" onclick="update('img-raw', 'تيشرت بوكس RAW.png', this)"></div>
                <div class="dot" style="background: #2d4f3c;" onclick="update('img-raw', 'تيشرت بوكس RAW (2).png', this)"></div>
                <div class="dot" style="background: #111;" onclick="update('img-raw', 'تيشرت بوكس RAW (3).png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="update('img-raw', 'تيشرت بوكس RAW (4).png', this)"></div>
            </div>
            <a href="https://wa.me/966502777884?text=طلب%20موديل%20RAW" class="btn">طلب عبر واتساب</a>
        </div>

        <div class="card">
            <div class="model-title">تيشيرت أوفر سايز سادة</div>
            <div class="img-wrapper">
                <img id="img-sada" class="product-img" src="sada02.png">
            </div>
            <div class="price">89 ر.س</div>
            <div class="color-options">
                <div class="dot active" style="background: #005a43;" onclick="update('img-sada', 'sada02.png', this)"></div>
                <div class="dot" style="background: #5a57d6;" onclick="update('img-sada', 'sada01.png', this)"></div>
                <div class="dot" style="background: #e69b73;" onclick="update('img-sada', 'sada03.png', this)"></div>
            </div>
            <a href="https://wa.me/966502777884?text=طلب%20موديل%20سادة" class="btn">طلب عبر واتساب</a>
        </div>

    </div>

    <script>
        function update(id, src, el) {
            const img = document.getElementById(id);
            img.style.opacity = '0.7';
            setTimeout(() => {
                img.src = src;
                img.style.opacity = '1';
            }, 100);
            
            const dots = el.parentElement.querySelectorAll('.dot');
            dots.forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }
    </script>

</body>
</html>
