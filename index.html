<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Official Store</title>
    
    <!-- خط تجول المتناسق مع الواجهات الرقمية الحديثة -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0c0827; /* البنفسجي الداكن لبنك فيجن */
            color: #ffffff; 
            text-align: center; 
            font-family: 'Tajawal', sans-serif; 
            margin: 0; 
            padding: 10px; 
            padding-bottom: 120px; 
        }
        
        .brand-header { 
            font-size: 2.5rem; 
            color: #ffffff; 
            letter-spacing: -1px; 
            margin: 25px 0; 
            font-weight: bold; 
        }
        .container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            max-width: 600px; 
            margin: auto; 
            padding: 10px; 
        }
        
        .card { 
            background: #17103f; /* درجة البنفسجي لبطاقات المنتجات */
            border: 1px solid #281d62; 
            border-radius: 16px; 
            padding: 12px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            transition: 0.3s; 
        }
        
        .card img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            background: #0c0827; 
        }
        
        .price { 
            color: #00e5ff; /* السماوي المضيء للأسعار */
            font-weight: bold; 
            margin-bottom: 10px; 
            font-size: 1.1rem; 
        }
        
        .product-title { 
            font-size: 0.9rem; 
            margin-bottom: 8px; 
            color: #ffffff; 
            font-weight: bold; 
        }
        .btns { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }
        
        .btn-add { 
            background: #00e5ff; /* زر الإضافة بالسماوي المضيء */
            color: #0c0827; 
            padding: 10px; 
            border-radius: 8px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 0.8rem; 
            font-family: 'Tajawal', sans-serif;
        }
        
        .btn-info { 
            border: 1px solid #281d62; 
            color: #b7aee2; 
            padding: 7px; 
            border-radius: 8px; 
            cursor: pointer; 
            background: none; 
            font-size: 0.7rem; 
            font-family: 'Tajawal', sans-serif;
        }
        
        .btn-vid { 
            border: 1px solid #281d62; 
            color: #00e5ff; 
            padding: 7px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-size: 0.7rem; 
            display: block; 
        }
        #details-modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(12, 8, 39, 0.95); 
            z-index: 2000; 
            justify-content: center; 
            align-items: center; 
        }
        
        .modal-content { 
            background: #17103f; 
            border: 1px solid #00e5ff; 
            padding: 25px; 
            border-radius: 20px; 
            width: 85%; 
            max-width: 400px; 
            text-align: right; 
            line-height: 1.6; 
        }
        
        .close-btn { 
            background: #00e5ff; 
            color: #0c0827; 
            padding: 10px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            margin-top: 20px; 
            width: 100%; 
            font-weight: bold; 
            font-family: 'Tajawal', sans-serif;
        }
        
        #cart-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: #00e5ff; 
            color: #0c0827; 
            padding: 15px 20px; 
            display: none; 
            justify-content: space-between; 
            align-items: center; 
            font-weight: bold; 
            z-index: 1000; 
            border-radius: 20px 20px 0 0; 
        }
        
        .btn-order { 
            background: #0c0827; 
            color: #00e5ff; 
            padding: 10px 20px; 
            border-radius: 10px; 
            text-decoration: none; 
            font-size: 0.9rem; 
        }
    </style>
</head>
<body>

    <div class="brand-header">EZWA</div>
    
    <div class="container" id="products-grid"></div>

    <div id="details-modal">
        <div class="modal-content">
            <h3 id="m-title" style="color: #00e5ff;"></h3>
            <p id="m-desc"></p>
            <p><strong>🧼 التعليمات:</strong> غسيل بارد - تجنب المبيض.</p>
            <p><strong>📏 المقاسات:</strong> S, M, L, XL, XXL (Oversize).</p>
            <button class="close-btn" onclick="closeModal()">إغلاق</button>
        </div>
    </div>

    <div id="cart-bar">
        <div id="cart-info">القطع: 0 | المجموع: 0 ر.س</div>
        <a href="#" onclick="sendWhatsApp()" class="btn-order">إرسال الطلب ✅</a>
    </div>
    <script>
        const baseURL = "https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/";
        const videoLink = "https://vt.tiktok.com/ZSxRBGRQT/";

        const products = [
            { id: 1, name: "GHOST", img: "TSHIRT GHOST.png", price: 115, desc: "لون رملي مميز - قصة واسعة مريحة" },
            { id: 2, name: "PURE", img: "TSHIRT PURE.png", price: 115, desc: "قطن فاخر 100% - رسم تجريدي على الظهر" },
            { id: 3, name: "FLOW", img: "TSHIRT FLOW.png", price: 115, desc: "ضربة فرشاة فنية - قماش معالج" },
            { id: 4, name: "MIND", img: "TSHIRT DATA.png", price: 115, desc: "تصميم فني عصري - إصدار محدود" }
        ];

        let cart = [];
        const grid = document.getElementById('products-grid');

        products.forEach((p) => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${baseURL + encodeURIComponent(p.img)}" alt="${p.name}">
                    <div class="product-title">${p.name}</div>
                    <div class="price">${p.price} ر.س</div>
                    <div class="btns">
                        <button class="btn-add" onclick="addToCart(${p.id})">➕ أضف للطلب</button>
                        <button class="btn-info" onclick="showDetails('${p.name}', '${p.desc}')">ℹ️ التفاصيل</button>
                        <a href="${videoLink}" target="_blank" class="btn-vid">🎬 فيديو</a>
                    </div>
                </div>
            `;
        });

        function showDetails(name, desc) {
            document.getElementById('m-title').innerText = name;
            document.getElementById('m-desc').innerHTML = "<strong>🧶 الوصف:</strong> " + desc;
            document.getElementById('details-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('details-modal').style.display = 'none'; }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            cart.push(product);
            document.getElementById('cart-bar').style.display = 'flex';
            updateCartBar();
        }

        function updateCartBar() {
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            document.getElementById('cart-info').innerText = `القطع: ${cart.length} | المجموع: ${total} ر.س`;
        }

        function sendWhatsApp() {
            let message = "أهلاً عزوة، أرغب في طلب هذه المنتجات (هوية فيجن):\n\n";
            cart.forEach((p, i) => { message += `${i + 1}- ${p.name}\n`; });
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            message += `\n💰 المجموع الإجمالي: ${total} ر.س`;
            window.open(`https://wa.me/966502777884?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
