<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Official Store</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        .brand-header { font-size: 3rem; color: #D4AF37; letter-spacing: -3px; margin: 25px 0; font-weight: bold; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 600px; margin: auto; padding: 10px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        .price { color: #D4AF37; font-weight: bold; margin-bottom: 12px; font-size: 1rem; }
        .btns { display: flex; flex-direction: column; gap: 8px; }
        .btn-wa { background: #D4AF37; color: #000; padding: 10px; border-radius: 6px; text-decoration: none; font-size: 0.7rem; font-weight: bold; }
        .btn-tiktok { border: 1px solid #333; color: #D4AF37; padding: 8px; border-radius: 6px; text-decoration: none; font-size: 0.65rem; }
    </style>
</head>
<body>

    <div class="brand-header">EZWA</div>

    <div class="container">
        <script>
            // الأسماء الصحيحة لصورك كما هي في GitHub
            const images = [
                "TSHIRT BOX RAW.png",
                "تيشرت بوكس RAW.png",
                "تيشرت بوكس RAW (2).png",
                "تيشرت بوكس RAW (3).png",
                "تيشرت بوكس RAW (4).png",
                "تيشرت اوفر سايز.png"
            ];
            
            // الرابط الذي أرسلته أنت
            const videoLink = "https://vt.tiktok.com/ZSxRBGRQT/";

            images.forEach((img, i) => {
                document.write(`
                    <div class="card">
                        <img src="${encodeURIComponent(img)}" alt="EZWA">
                        <div class="price">89 ر.س</div>
                        <div class="btns">
                            <a href="https://wa.me/966502777884" target="_blank" class="btn-wa">واتساب مباشر</a>
                            <a href="${videoLink}" target="_blank" class="btn-tiktok">مشاهدة الفيديو</a>
                        </div>
                    </div>
                `);
            });
        </script>
    </div>

</body>
</html>
