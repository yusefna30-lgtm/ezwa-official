<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | VISION IDENTITY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- الهوية البصرية (ألوان وتنسيقات بنكية) --- */
        :root { 
            --vision-gold: #D4AF37; 
            --deep-black: #050505; 
            --panel-bg: #111111;
            --border-color: #222222;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--deep-black); 
            color: #ffffff; 
            margin: 0; 
            padding-bottom: 120px; 
            letter-spacing: 0.5px;
        }

        /* رأس الصفحة - فخامة هادئة */
        .brand-header { 
            padding: 40px 0; 
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }
        .brand-name { 
            font-size: 2.5rem; 
            font-weight: 800; 
            color: var(--vision-gold); 
            text-transform: uppercase;
            margin: 0;
        }

        /* الشبكة العامة */
        .main-container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
        }

        /* بطاقة المنتج - تصميم هندسي */
        .vision-card { 
            background: var(--panel-bg); 
            border: 1px solid var(--border-color);
            border-radius: 4px; /* زوايا بنكية حادة قليلاً */
            padding: 20px;
            transition: all 0.4s ease;
            position: relative;
        }
        .vision-card:hover {
            border-color: var(--vision-gold);
            background: #161616;
        }

        /* إطار الصورة - مساحة عرض نظيفة */
        .image-frame { 
            width: 100%; 
            height: 220px; 
            background: #ffffff; 
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
        }
        .item-img { max-width: 85%; max-height: 85%; object-fit: contain; }

        /* التحكم بالألوان - دوائر محددة */
        .color-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .color-option { 
            width: 20px; height: 20px; border-radius: 50%; 
            border: 2px solid #333; cursor: pointer; transition: 0.3s;
        }
        .color-option.active { 
            border-color: var(--vision-gold); 
            transform: scale(1.2); 
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .item-title { 
            font-size: 0.85rem; 
            color: #888; 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            font-weight: 600;
        }

        /* لوحة التحكم بالكمية - تصميم بنكي منظم */
        .transaction-box { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: var(--glass);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            margin-bottom: 15px;
        }
        .action-btn { 
            background: none; border: none; color: var(--vision-gold); 
            font-size: 1.5rem; cursor: pointer; width: 30px; font-weight: 800;
        }
        .qty-display { font-size: 1.2rem; font-weight: 800; color: #fff; }

        /* أزرار العمليات */
        .order-btn { 
            background: var(--vision-gold); 
            color: #000; 
            border: none; 
            width: 100%; 
            padding: 14px; 
            font-weight: 800; 
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .order-btn:hover { background: #b8972f; }

        /* شريط الطلب السفلي */
        .footer-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(5, 5, 5, 0.95); 
            border-top: 1px solid var(--vision-gold); 
            padding: 20px; display: none; z-index: 1000;
            backdrop-filter: blur(10px);
        }

        @media (min-width: 992px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

    <header class="brand-header">
        <h1 class="brand-name">TOP GIVING</h1>
    </header>

    <div class="main-container">
        <div class="product-grid" id="vision-grid">
            </div>
    </div>

    <div id="footer-bar" class="footer-bar">
        <button class="order-btn" onclick="checkout()" style="max-width: 400px; margin: 0 auto; display: block; background: #fff;">إرسال ملف الطلب عبر واتساب</button>
    </div>

<script>
    // بيانات المنتجات بنفس ترتيبك الأصلي
    const data = [
        { id: '01', name: 'MODEL 01 / OVERSYZE', img: 't1-white.png', colors: [{n:'أبيض', h:'#fff', i:'t1-white.png'}, {n:'أسود', h:'#000', i:'t1-black.png'}, {n:'أزرق', h:'#00f', i:'t1-blue.png'}] },
        { id: '02', name: 'MODEL 02 / OVERSYZE', img: 't2-purple.png.png', colors: [{n:'بنفسجي', h:'#A020F0', i:'t2-purple.png.png'}, {n:'أبيض', h:'#fff', i:'t2-white.png.png'}, {n:'أسود', h:'#000', i:'t2-black.png.png'}] },
        { id: '03', name: 'MODEL 03 / OVERSYZE', img: 'te3-beige.png.png', colors: [{n:'بيج', h:'#F5F5DC', i:'te3-beige.png.png'}, {n:'أسود', h:'#000', i:'te1-black.png.png'}] },
        { id: '04', name: 'MODEL 04 / OVERSYZE', img: 'tr1-red.png.png', colors: [{n:'أحمر', h:'#BA1313', i:'tr1-red.png.png'}, {n:'أسود', h:'#000', i:'tr2-black.png.png'}] },
        { id: '05', name: 'MODEL 05 / OVERSYZE', img: 'n5-white.png.png', colors: [{n:'أبيض', h:'#fff', i:'n5-white.png.png'}, {n:'أسود', h:'#000', i:'n5-black.png.png'}] },
        { id: 'sm', name: 'PREMIUM SET / SM', img: 'Picsart_26-05-28_16-28-24-642.jpg', colors: [{n:'أسود', h:'#000', i:'Picsart_26-05-28_16-28-24-642.jpg'}, {n:'سكري', h:'#FFFDD0', i:'Picsart_26-05-28_16-26-55-580.jpg'}] }
    ];

    let basket = {}; let currentSpecs = {};

    const grid = document.getElementById('vision-grid');
    data.forEach(p => {
        currentSpecs[p.id] = { color: p.colors[0].n, qty: 16 };
        
        const card = document.createElement('div');
        card.className = 'vision-card';
        card.innerHTML = `
            <div class="image-frame"><img src="${p.img}" id="view-${p.id}" class="item-img"></div>
            <div class="color-selector">${p.colors.map(c => `<div class="color-option" style="background:${c.h}" onclick="changeVariant('${p.id}','${c.i}','${c.n}',this)"></div>`).join('')}</div>
            <div class="item-title">${p.name}</div>
            <div class="transaction-box">
                <button class="action-btn" onclick="updateAmount('${p.id}',-16)">-</button>
                <span class="qty-display" id="num-${p.id}">16</span>
                <button class="action-btn" onclick="updateAmount('${p.id}',16)">+</button>
            </div>
            <button class="order-btn" onclick="addToBasket('${p.id}', '${p.name}')">إضافة للمحفظة</button>
        `;
        grid.appendChild(card);
    });

    function changeVariant(id, img, cName, el) {
        document.getElementById('view-'+id).src = img;
        el.parentElement.querySelectorAll('.color-option').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
        currentSpecs[id].color = cName;
    }

    function updateAmount(id, val) {
        let n = currentSpecs[id].qty + val;
        if (n < 16) n = 16;
        currentSpecs[id].qty = n;
        document.getElementById('num-'+id).innerText = n;
    }

    function addToBasket(id, name) {
        const spec = currentSpecs[id];
        basket[`${id}_${spec.color}`] = { name: name, color: spec.color, qty: spec.qty };
        document.getElementById('footer-bar').style.display = 'block';
        alert("تم التجهيز بنجاح");
    }

    function checkout() {
        let text = "🏛️ طلب توريد جديد - TOP GIVING\n";
        text += "==========================\n";
        for (let k in basket) {
            text += `🔹 ${basket[k].name}\n   اللون: ${basket[k].color} | الكمية: ${basket[k].qty}\n`;
        }
        window.open(`https://wa.me/966560564719?text=${encodeURIComponent(text)}`);
    }
</script>
</body>
</html>
