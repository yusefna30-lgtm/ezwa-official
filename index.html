<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Official Store</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        .brand-header { font-size: 3rem; color: #D4AF37; letter-spacing: -3px; margin: 25px 0; font-weight: bold; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: 1000px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; width: calc(50% - 12px); min-width: 160px; padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        .title { font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; color: #fff; height: 35px; }
        .price { color: #D4AF37; font-weight: bold; margin-bottom: 15px; font-size: 1rem; }
        .btns { display: flex; flex-direction: column; gap: 6px; }
        .btn-wa { background: #D4AF37; color: #000; padding: 10px; border-radius: 6px; text-decoration: none; font-size: 0.7rem; font-weight: bold; }
        .btn-video { border: 1px solid #333; color: #D4AF37; padding: 7px; border-radius: 6px; text-decoration: none; font-size: 0.65rem; }
    </style>
</head>
<body>
    <div class="brand-header">EZWA</div>
    <div class="container">
        <script>
            const titles = [
                "PREMIUM RAW", 
                "ESSENTIAL BLACK", 
                "STREET MODE", 
                "URBAN STYLE", 
                "PREMIUM SET", 
                "EZWA SPECIAL"
            ];
            for(let i=1; i<=6; i++) {
                document.write(`
                    <div class="card">
                        <img src="${i}.png" alt="Product ${i}">
                        <div class="title">${titles[i-1]}</div>
                        <div class="price">89 ر.س</div>
                        <div class="btns">
                            <a href="https://wa.me/966502777884" class="btn-wa">واتساب مباشر</a>
                            <a href="https://www.instagram.com/ezwa.36" target="_blank" class="btn-video">مشاهدة الفيديو</a>
                        </div>
                    </div>
                `);
            }
        </script>
    </div>
</body>
</html>
