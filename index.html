<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Store</title>
    <style>
        /* التنسيق الأساسي للصفحة */
        body { 
            font-family: sans-serif; 
            background-color: #000; 
            color: #fff; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        
        /* تنسيق اسم البراند */
        .brand { 
            font-size: 3rem; 
            color: #D4AF37; 
            margin: 40px 0; 
            font-weight: bold; 
            letter-spacing: 5px; 
        }
        
        /* شبكة عرض المنتجات */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            max-width: 1100px; 
            margin: auto; 
        }
        
        /* تنسيق كرت المنتج الأساسي */
        .card { 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
            border-radius: 20px; 
            padding: 20px; 
            transition: all 0.4s ease; /* حركة انسيابية لجميع التأثيرات */
            position: relative;
        }

        /* [تعديل جديد] تأثير حركي فخم عند تمرير الفأرة فوق كرت المنتج */
        .card:hover {
            transform: translateY(-10px); /* يرتفع الكرت للأعلى بمقدار 10 بكسل */
            border-color: #D4AF37; /* يتغير لون الإطار إلى الذهبي */
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.15); /* إضاءة ذهبية خافتة خلف الكرت */
        }
        
        /* تنسيق صور المنتجات */
        .card img { 
            width: 100%; 
            height: 400px; 
            object-fit: cover; 
            border-radius: 12px; 
            background: #111; 
            margin-bottom: 20px; 
        }
        
        /* تنسيق السعر */
        .price { 
            color: #D4AF37; 
            font-weight: bold; 
            font-size: 1.8rem; 
            margin-bottom: 15px; 
        }
        
        /* تنسيق زر الواتساب الأساسي */
        .btn { 
            display: block; 
            background: #D4AF37; 
            color: #000; 
            padding: 15px; 
            border-radius: 10px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.2rem; 
            transition: background 0.3s ease;
            margin-bottom: 10px;
        }

        .btn:hover {
            background: #b8932e; /* تغميق اللون الذهبي قليلاً عند اللمس */
        }

        /* [تعديل جديد] تنسيق زر مشاركة المنتج */
        .share-btn {
            display: block;
            background: transparent;
            color: #fff;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .share-btn:hover {
            background: #111;
            border-color: #fff;
        }
    </style>
</head>
<body>

    <div class="brand">EZWA</div>

    <div class="grid">
        <!-- المنتج الأول -->
        <div class="card">
            <img src="https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/TSHIRT%20BOX%20RAW.png" alt="RAW Box">
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884?text=أهلاً%20عزوة..%20أرغب%20في%20طلب%20بوكس%20RAW" class="btn">واتساب مباشر</a>
            <!-- زر المشاركة المطور مع دالة جافاسكريبت مخصصة لهذا المنتج -->
            <button class="share-btn" onclick="shareProduct('بوكس RAW', window.location.href)">🔗 مشاركة المنتج</button>
        </div>

        <!-- المنتج الثاني -->
        <div class="card">
            <img src="https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/persist-white.JPG" alt="Persist White">
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884?text=أهلاً%20عزوة..%20أرغب%20في%20طلب%20تيشيرت%20Persist" class="btn">واتساب مباشر</a>
            <button class="share-btn" onclick="shareProduct('تيشيرت Persist', window.location.href)">🔗 مشاركة المنتج</button>
        </div>

        <!-- المنتج الثالث -->
        <div class="card">
            <img src="https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/17791343971943769684611368319521_eae72e.jpg" alt="EZWA Collection">
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884?text=أهلاً%20عزوة..%20أرغب%20في%20طلب%20تيشيرت%20عزوة" class="btn">واتساب مباشر</a>
            <button class="share-btn" onclick="shareProduct('تيشيرت عزوة', window.location.href)">🔗 مشاركة المنتج</button>
        </div>
    </div>

    <!-- سكريبت الجافاسكريبت للتحكم بميزة المشاركة والنسخ -->
    <script>
        function shareProduct(productName, productUrl) {
            // التحقق مما إذا كان متصفح المستخدم يدعم ميزة المشاركة الأصلية للهواتف
            if (navigator.share) {
                navigator.share({
                    title: productName,
                    text: `شاهد هذا المنتج المميز من عزوة: ${productName}`,
                    url: productUrl
                }).catch(console.error);
            } else {
                // في حال كان المتصفح على الكمبيوتر، يتم نسخ الرابط تلقائياً وإعلام المستخدم
                navigator.clipboard.writeText(productUrl).then(function() {
                    alert('تم نسخ رابط المتجر لمشاركة ' + productName + ' بنجاح!');
                }, function(err) {
                    console.error('فشل نسخ الرابط: ', err);
                });
            }
        }
    </script>

</body>
</html>
