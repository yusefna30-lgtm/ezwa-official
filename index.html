<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA STORE</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        .brand-header { font-size: 3.5rem; color: #D4AF37; letter-spacing: -4px; margin: 20px 0; font-weight: bold; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px; max-width: 800px; margin: auto; }
        .product-card { background: #0a0a0a; border: 1px solid #D4AF37; border-radius: 12px; padding: 15px; }
        .product-card img { width: 100%; height: auto; border-radius: 8px; margin-bottom: 10px; }
        .product-title { font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #fff; }
        .price { color: #D4AF37; font-weight: bold; margin-bottom: 15px; font-size: 1rem; }
        .order-btn { background: #D4AF37; color: #000; padding: 10px; border-radius: 5px; text-decoration: none; font-size: 0.7rem; font-weight: bold; display: block; }
    </style>
</head>
<body>

    <div class="brand-header">EZWA</div>

    <div class="product-grid">
        <div class="product-card">
            <img src="TSHIRT BOX RAW.png" alt="Premium Raw">
            <div class="product-title">PREMIUM RAW</div>
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884" class="order-btn">اطلب واتساب</a>
        </div>

        <div class="product-card">
            <img src="تيشرت بوكس RAW (2).png" alt="Essential Black">
            <div class="product-title">ESSENTIAL BLACK</div>
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884" class="order-btn">اطلب واتساب</a>
        </div>
    </div>

</body>
</html>
