<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Official Store</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        .brand-header { font-size: 3rem; color: #D4AF37; letter-spacing: -4px; text-transform: uppercase; margin: 20px 0; font-weight: bold; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 5px; max-width: 800px; margin: auto; }
        .product-card { background: #0a0a0a; border: 1px solid #D4AF37; border-radius: 12px; padding: 8px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .badge { position: absolute; top: 12px; right: 12px; background: #D4AF37; color: #000; padding: 3px 7px; font-size: 0.55rem; font-weight: bold; border-radius: 4px; z-index: 10; text-transform: uppercase; }
        .product-card img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 8px; margin-bottom: 6px; }
        .product-title { font-size: 0.7rem; font-weight: bold; margin-bottom: 5px; letter-spacing: -0.5px; }
        .price { color: #D4AF37; font-size: 0.95rem; font-weight: bold; margin-bottom: 8px; }
        .btn-group { display: flex; flex-direction: column; gap: 5px; }
        .order-btn { background: #D4AF37; color: #000 !important; text-decoration: none; padding: 8px 0; border-radius: 6px; font-weight: bold; font-size: 0.65rem; }
        .video-btn { background: transparent; color: #D4AF37 !important; border: 1px solid #D4AF37; text-decoration: none; padding: 6px 0; border-radius: 6px; font-weight: bold; font-size: 0.6rem; cursor: pointer; }
        footer { margin-top: 30px; color: #444; font-size: 0.7rem; padding-bottom: 20px; }
    </style>
</head>
<body>
    <div class="brand-header">EZWA</div>
    <div class="product-grid">
        <!-- كرر هذا البلوك 6 مرات لكل صورة من صورك -->
        <div class="product-card">
            <span class="badge">NEW</span>
            <img src="تيشرت بوكس RAW.png">
            <div class="product-title">PERSIST BOXY FIT</div>
            <div class="price">89 ر.س</div>
            <div class="btn-group">
                <a href="https://wa.me/966502777884" class="order-btn">اطلب عبر واتساب</a>
                <a href="#" class="video-btn">مشاهدة الفيديو</a>
            </div>
        </div>
        <!-- أضف بقية المنتجات هنا بنفس الطريقة -->
    </div>
    <footer>EZWA STORE 2026 ©</footer>
</body>
</html>
