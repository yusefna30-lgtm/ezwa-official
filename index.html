<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA | Official Store</title>
    <style>
        body {
            background-color: #000000;
            color: #D4AF37; /* لون ذهبي فخم */
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            letter-spacing: -3px; /* المسافات المتقاربة التي اخترتها */
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .product-card {
            border: 1px solid #D4AF37;
            padding: 10px;
            background: #0a0a0a;
        }
        img {
            width: 100%;
            height: auto;
            filter: contrast(1.1); /* لمسة سينمائية عالية التباين */
        }
        .product-name {
            margin-top: 15px;
            font-size: 1.2rem;
            letter-spacing: -1px;
        }
    </style>
</head>
<body>

    <h1>EZWA</h1>

    <div class="gallery">
        <!-- عرض الصور التي رفعتها -->
        <div class="product-card">
            <img src="تيشرت بوكس RAW.png" alt="Persist Collection">
            <div class="product-name">PERSIST SIGNATURE</div>
        </div>
        
        <div class="product-card">
            <img src="تيشرت اوفر سايز.png" alt="Alone Collection">
            <div class="product-name">ALONE OVERSIZED</div>
        </div>
        
        <!-- يمكنك إضافة المزيد من الكروت هنا لبقية الصور بنفس الطريقة -->
    </div>

</body>
</html>
