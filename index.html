<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Store</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #000; 
            color: #fff; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }

        .brand { 
            font-size: 3.5rem; 
            color: #D4AF37; 
            margin: 40px 0; 
            font-weight: bold; 
            letter-spacing: 8px;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1100px; 
            margin: auto; 
        }

        .card { 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
            border-radius: 20px; 
            padding: 20px; 
            transition: 0.3s ease;
            overflow: hidden; /* لمنع خروج الصور عن الإطار */
        }

        .card:hover {
            border-color: #D4AF37;
            transform: translateY(-5px);
        }

        .product-name {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #ccc;
        }

        /* تنسيق الصور المحسن */
        .card img { 
            width: 100%; 
            height: 350px; 
            object-fit: cover; 
            border-radius: 12px; 
            background: #111; /* لون خلفية يظهر أثناء التحميل */
            margin-bottom: 20px;
            display: block;
        }

        .price { 
            color: #D4AF37; 
            font-weight: bold; 
            font-size: 1.8rem; 
            margin-bottom: 20px; 
        }

        .btn { 
            display: block; 
            background: #D4AF37; 
            color: #000; 
            padding: 15px; 
            border-radius: 10px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.1rem; 
            margin-bottom: 10px;
        }

        .share-btn {
            background: none;
            border: 1px solid #333;
            color: #777;
            padding: 8px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="brand">EZWA</div>

    <div class="grid">
        <div class="card">
            <div class="product-name">RAW Box</div>
            <img src="https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/TSHIRT%20BOX%20RAW.png" alt="RAW Box">
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884?text=طلب%20بوكس%20RAW" class="btn">واتساب مباشر</a>
            <button class="share-btn" onclick="alert('تم نسخ الرابط')">🔗 مشاركة المنتج</button>
        </div>

        <div class="card">
            <div class="product-name">Persist White</div>
            <img src="https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/persist-white.JPG" alt="Persist White">
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884?text=طلب%20تيشيرت%20Persist" class="btn">واتساب مباشر</a>
            <button class="share-btn" onclick="alert('تم نسخ الرابط')">🔗 مشاركة المنتج</button>
        </div>

        <div class="card">
            <div class="product-name">EZWA Collection</div>
            <img src="https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/17791343971943769684611368319521_eae72e.jpg" alt="EZWA Collection">
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884?text=طلب%20تيشيرت%20عزوة" class="btn">واتساب مباشر</a>
            <button class="share-btn" onclick="alert('تم نسخ الرابط')">🔗 مشاركة المنتج</button>
        </div>
    </div>

</body>
</html>
