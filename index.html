<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Official Store</title>
    <style>
        /* التنسيقات الأصلية مع تحسينات بسيطة */
        body { background-color: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        .brand-header { font-size: 3rem; color: #D4AF37; letter-spacing: -3px; margin: 25px 0; font-weight: bold; }
        
        /* شبكة العرض (2 في كل صف كما في كودك) */
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 600px; margin: auto; padding: 10px; }
        
        /* تأثير الحركة عند اللمس */
        .card { 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
            border-radius: 15px; 
            padding: 12px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            border-color: #D4AF37;
        }

        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; background: #111; }
        .price { color: #D4AF37; font-weight: bold; margin-bottom: 12px; font-size: 1rem; }
        .btns { display: flex; flex-direction: column; gap: 8px; }
        
        .btn-wa { background: #D4AF37; color: #000; padding: 10px; border-radius: 6px; text-decoration: none; font-size: 0.7rem; font-weight: bold; }
        
        /* زر المشاركة الجديد بنفس نمط زر تيك توك */
        .btn-share { border: 1px solid #333; color: #fff; padding: 8px; border-radius: 6px; text-decoration: none; font-size: 0.65rem; cursor: pointer; background: none; }
        
        .btn-tiktok { border: 1px solid #333; color: #D4AF37; padding: 8px; border-radius: 6px; text-decoration: none; font-size: 0.65rem; }
    </style>
</head>
<body>

    <div class="brand-header">EZWA</div>

    <div class="container" id="products-grid">
        <script>
            // رابط المستودع الخام على GitHub لضمان ظهور الصور
            const baseURL = "https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/";

            // الأسماء الصحيحة لصورك
            const images = [
                "new%20tshirt%2001.jpg",
                "تيشرت%20بوكس%20RAW.png",
                "تيشرت%20بوكس%20RAW%20(2).png",
                "تيشرت%20بوكس%20RAW%20(3).png",
                "تيشرت%20بوكس%20RAW%20(4).png",
                "تيشرت%20اوفر%20سايز.png"
            ];
            
            const videoLink = "https://vt.tiktok.com/ZSxRBGRQT/";

            const grid = document.getElementById('products-grid');

            images.forEach((imgName) => {
                const fullImgPath = baseURL + imgName;
                
                grid.innerHTML += `
                    <div class="card">
                        <img src="${fullImgPath}" alt="EZWA Product" onerror="this.src='https://via.placeholder.com/180x180/111/D4AF37?text=EZWA'">
                        <div class="price">89 ر.س</div>
                        <div class="btns">
                            <a href="https://wa.me/966502777884" target="_blank" class="btn-wa">واتساب مباشر</a>
                            <a href="${videoLink}" target="_blank" class="btn-tiktok">مشاهدة الفيديو</a>
                            <button onclick="shareProduct('${fullImgPath}')" class="btn-share">🔗 مشاركة</button>
                        </div>
                    </div>
                `;
            });

            function shareProduct(link) {
                if (navigator.share) {
                    navigator.share({ title: 'متجر عزوة', url: window.location.href });
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    alert('تم نسخ رابط المتجر!');
                }
            }
        </script>
    </div>

</body>
</html>
