<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Official Store</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        .brand-header { font-size: 3rem; color: #D4AF37; letter-spacing: -3px; margin: 20px 0; font-weight: bold; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 800px; margin: auto; }
        .product-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; align-items: center; }
        .product-card img { width: 100%; height: auto; border-radius: 8px; margin-bottom: 10px; }
        .product-title { font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; color: #fff; height: 35px; display: flex; align-items: center; }
        .price { color: #D4AF37; font-weight: bold; margin-bottom: 12px; font-size: 0.9rem; }
        .btn-group { display: flex; flex-direction: column; gap: 6px; width: 100%; }
        .order-btn { background: #D4AF37; color: #000; padding: 8px; border-radius: 5px; text-decoration: none; font-size: 0.65rem; font-weight: bold; }
        .video-btn { background: none; border: 1px solid #333; color: #D4AF37; padding: 6px; border-radius: 5px; text-decoration: none; font-size: 0.6rem; }
    </style>
</head>
<body>

    <div class="brand-header">EZWA</div>

    <div class="product-grid">
        <script>
            const images = [
                "TSHIRT BOX RAW.png",
                "%D8%AA%D9%8A%D8%B4%D8%B1%D8%AA%20%D8%A8%D9%88%D9%83%D8%B3%20RAW%20(2).png",
                "%D8%AA%D9%8A%D8%B4%D8%B1%D8%AA%20%D8%A8%D9%88%D9%83%D8%B3%20RAW%20(3).png",
                "%D8%AA%D9%8A%D8%B4%D8%B1%D8%AA%20%D8%A8%D9%88%D9%83%D8%B3%20RAW%20(4).png",
                "%D8%AA%D9%8A%D8%B4%D8%B1%D8%AA%20%D8%A8%D9%88%D9%83%D8%B3%20RAW%20(5).png",
                "%D8%AA%D9%8A%D8%B4%D8%B1%D8%AA%20%D8%A8%D9%88%D9%83%D8%B3%20RAW%20(6).png"
            ];
            const titles = ["PREMIUM RAW", "ESSENTIAL BLACK", "STREET MODE", "URBAN STYLE", "PREMIUM SET", "EZWA SPECIAL"];
            
            let gridHtml = "";
            images.forEach((img, i) => {
                gridHtml += `
                <div class="product-card">
                    <img src="${img}" alt="EZWA Product">
                    <div class="product-title">${titles[i]}</div>
                    <div class="price">89 ر.س</div>
                    <div class="btn-group">
                        <a href="https://wa.me/966502777884" class="order-btn">واتساب مباشر</a>
                        <a href="#" class="video-btn">مشاهدة الفيديو</a>
                    </div>
                </div>`;
            });
            document.write(`<div class="product-grid">${gridHtml}</div>`);
        </script>
    </div>

</body>
</html>
