<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA | Official Store</title>
    <style>
        body {
            background-color: #000000;
            color: #D4AF37;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            letter-spacing: -2px; /* تقريب المسافات بين الحروف للأناقة */
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            letter-spacing: 1px;
            opacity: 0.8;
        }
        .collection {
            margin-top: 30px;
            border: 1px solid #D4AF37;
            padding: 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>EZWA</h1>
    <p>Luxury Streetwear | Alone & Persist Collections</p>
    
    <div class="collection">
        <p>New Oversized Sets Coming Soon</p>
    </div>
</body>
</html>
