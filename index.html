<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Store</title>
    <style>
        body { font-family: sans-serif; background: #00; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .header { font-size: 3rem; color: #D4AF37; margin-bottom: 40px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1000px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 15px; }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 15px; background: #111; min-height: 250px; }
        .price { color: #D4AF37; font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; }
        .btn { display: block; background: #D4AF37; color: #000; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">EZWA</div>
    <div class="grid">
        <div class="card">
            <img src="TSHIRT BOX RAW.png">
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884?text=طلب%20بوكس%20RAW" class="btn">واتساب مباشر</a>
        </div>
        <div class="card">
            <img src="persist-white.JPG">
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884?text=طلب%20Persist" class="btn">واتساب مباشر</a>
        </div>
        <div class="card">
            <img src="17791343971943769684611368319521_eae72e.jpg">
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884?text=طلب%20عزوة" class="btn">واتساب مباشر</a>
        </div>
    </div>
</body>
</html>
