<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Official Store</title>
    
    <!-- خط تجول المتناسق مع الواجهات الرقمية الحديثة -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
<style>
    html, body { 
        background-color: #050505 !important; 
        margin: 0; 
        padding: 0;
        overflow-x: hidden;
    }
    
    body { 
        /* تدرج هادئ جداً يعطي عمقاً للخلفية */
        background: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050505 80%) no-repeat fixed !important;
        color: #ffffff; 
        text-align: center; 
        font-family: 'Tajawal', sans-serif; 
        padding: 40px 10px 150px 10px; 
        min-height: 100vh;
    }

    .brand-header { 
        font-size: 3.5rem; 
        font-weight: 900;
        /* تدرج فضي كريستالي */
        background: linear-gradient(180deg, #ffffff 40%, #777777 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 50px; 
        letter-spacing: 5px;
        filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
    }

    .container { 
        display: grid; 
        grid-template-columns: 1fr 1fr; 
        gap: 15px; 
        max-width: 500px; 
        margin: auto; 
    }

    .card { 
        background: linear-gradient(145deg, #111111, #080808); 
        border: 1px solid #1a1a1a; 
        border-radius: 25px; 
        padding: 15px; 
        display: flex; 
        flex-direction: column; 
        justify-content: space-between;
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        transition: 0.3s ease;
    }

    .card:hover {
        border-color: #00e5ff;
        transform: translateY(-5px);
    }

    .card img { 
        width: 100%; 
        height: 170px; 
        object-fit: cover; 
        border-radius: 18px; 
        margin-bottom: 15px;
        background: #000;
    }

    .product-title { 
        font-size: 1rem; 
        font-weight: 700; 
        color: #ffffff !important;
        margin-bottom: 10px;
        letter-spacing: 1px;
    }

    .price { 
        color: #00e5ff; 
        font-weight: 800; 
        font-size: 1.2rem; 
        margin-bottom: 15px;
        text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
    }

    .btns { display: flex; flex-direction: column; gap: 8px; }

    .btn-add { 
        background: #00e5ff; 
        color: #000; 
        border: none; 
        padding: 14px; 
        border-radius: 15px; 
        font-weight: 900; 
        font-size: 0.9rem;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(0, 229, 255, 0.2);
    }

    .btn-info, .btn-vid { 
        background: rgba(255,255,255,0.02); 
        color: #555; 
        border: 1px solid #1a1a1a; 
        padding: 10px; 
        border-radius: 12px; 
        font-size: 0.75rem; 
        text-decoration: none;
        transition: 0.3s;
    }

    .btn-info:hover, .btn-vid:hover { color: #aaa; background: rgba(255,255,255,0.05); }

    #cart-bar { 
        position: fixed; bottom: 0; left: 0; right: 0; 
        background: rgba(0, 229, 255, 0.95); 
        backdrop-filter: blur(15px);
        color: #000; padding: 20px; 
        display: none; justify-content: space-between; align-items: center; 
        z-index: 1000; border-radius: 30px 30px 0 0; 
        box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
    }
</style>
</style>
</head>
<body>

    <div class="brand-header">EZWA</div>
    
    <div class="container" id="products-grid"></div>

    <div id="details-modal">
        <div class="modal-content">
            <h3 id="m-title" style="color: #00e5ff;"></h3>
            <p id="m-desc"></p>
            <p><strong>🧼 التعليمات:</strong> غسيل بارد - تجنب المبيض.</p>
            <p><strong>📏 المقاسات:</strong> S, M, L, XL, XXL (Oversize).</p>
            <button class="close-btn" onclick="closeModal()">إغلاق</button>
        </div>
    </div>

    <div id="cart-bar">
        <div id="cart-info">القطع: 0 | المجموع: 0 ر.س</div>
        <a href="#" onclick="sendWhatsApp()" class="btn-order">إرسال الطلب ✅</a>
    </div>
    <script>
        const baseURL = "https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/";
        const videoLink = "https://vt.tiktok.com/ZSxRBGRQT/";

        const products = [
            { id: 1, name: "GHOST", img: "TSHIRT GHOST.png", price: 115, desc: "لون رملي مميز - قصة واسعة مريحة" },
            { id: 2, name: "PURE", img: "TSHIRT PURE.png", price: 115, desc: "قطن فاخر 100% - رسم تجريدي على الظهر" },
            { id: 3, name: "FLOW", img: "TSHIRT FLOW.png", price: 115, desc: "ضربة فرشاة فنية - قماش معالج" },
            { id: 4, name: "MIND", img: "TSHIRT DATA.png", price: 115, desc: "تصميم فني عصري - إصدار محدود" }
        ];

        let cart = [];
        const grid = document.getElementById('products-grid');

        products.forEach((p) => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${baseURL + encodeURIComponent(p.img)}" alt="${p.name}">
                    <div class="product-title">${p.name}</div>
                    <div class="price">${p.price} ر.س</div>
                    <div class="btns">
                        <button class="btn-add" onclick="addToCart(${p.id})">➕ أضف للطلب</button>
                        <button class="btn-info" onclick="showDetails('${p.name}', '${p.desc}')">ℹ️ التفاصيل</button>
                        <a href="${videoLink}" target="_blank" class="btn-vid">🎬 فيديو</a>
                    </div>
                </div>
            `;
        });

        function showDetails(name, desc) {
            document.getElementById('m-title').innerText = name;
            document.getElementById('m-desc').innerHTML = "<strong>🧶 الوصف:</strong> " + desc;
            document.getElementById('details-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('details-modal').style.display = 'none'; }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            cart.push(product);
            document.getElementById('cart-bar').style.display = 'flex';
            updateCartBar();
        }

        function updateCartBar() {
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            document.getElementById('cart-info').innerText = `القطع: ${cart.length} | المجموع: ${total} ر.س`;
        }

        function sendWhatsApp() {
            let message = "أهلاً عزوة، أرغب في طلب هذه المنتجات (هوية فيجن):\n\n";
            cart.forEach((p, i) => { message += `${i + 1}- ${p.name}\n`; });
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            message += `\n💰 المجموع الإجمالي: ${total} ر.س`;
            window.open(`https://wa.me/966502777884?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
