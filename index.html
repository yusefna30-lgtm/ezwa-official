<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA | Official Store</title>
    <style>
        body {
            background-color: #000000;
            color: #D4AF37;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
        }
        h1 {
            font-size: 3.5rem;
            letter-spacing: -3px; /* المسافات المتقاربة للأناقة */
            text-transform: uppercase;
            margin-bottom: 50px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }
        .product-card {
            background: #050505;
            border: 1px solid #1a1a1a;
            padding: 15px;
        }
        img {
            width: 100%;
            height: auto;
        }
        .product-name {
            margin-top: 15px;
            font-size: 1.1rem;
            letter-spacing: -1px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>EZWA</h1>

    <div class="gallery">
        <div class="product-card">
            <img src="تيشرت بوكس RAW.png" alt="EZWA Persist">
            <div class="product-name">PERSIST BOXY FIT</div>
        </div>
        <div class="product-card">
            <img src="تيشرت اوفر سايز.png" alt="EZWA Alone">
            <div class="product-name">ALONE OVERSIZED</div>
        </div>
        <div class="product-card">
            <img src="تيشرت بوكس RAW (2).png" alt="EZWA Collection">
            <div class="product-name">SILENT LUXURY PIECE</div>
        </div>
    </div>

</body>
</html>
