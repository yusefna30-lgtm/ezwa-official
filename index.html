<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <title>EZWA Official Store</title>
    <style>
        body { font-family: sans-serif; background-color: #000; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .brand { font-size: 3rem; color: #D4AF37; margin: 40px 0; font-weight: bold; letter-spacing: 5px; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 30px; max-width: 500px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 20px; width: 100%; box-sizing: border-box; }
        .card img { width: 100%; height: auto; border-radius: 15px; background: #111; display: block; min-height: 300px; margin-bottom: 20px; }
        .price { color: #D4AF37; font-size: 2rem; font-weight: bold; margin-bottom: 15px; }
        .btn { display: block; background: #D4AF37; color: #000; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="brand">EZWA</div>

        <div class="card">

            <div class="price">89 ر.س</div>

        </div>
