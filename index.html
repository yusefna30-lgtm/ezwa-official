<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Official Store</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .brand-header { font-size: 2.8rem; color: #D4AF37; margin: 40px 0; font-weight: bold; letter-spacing: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1100px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 20px; transition: 0.4s; }
        .card:hover { border-color: #D4AF37; transform: translateY(-8px); }
        .card img { width: 100%; height: 380px; object-fit: cover; border-radius: 12px; background: #111; margin-bottom: 20px; }
        .price { color: #D4AF37; font-weight: bold; font-size: 1.6rem; margin-bottom: 10px; }
        .desc { color: #888; font-size: 1rem; margin-bottom: 20px; }
        .btn { display: block; background: #D4AF37; color: #000; padding: 14px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="brand-header">EZWA</div>

    <div class="grid" id="main-catalog">
        </div>

    <script>
        // روابط الصور المباشرة (Raw) لضمان الظهور 100%
        const products = [
            { 
                name: "RAW Box Edition", 
                url: "https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/TSHIRT%20BOX%20RAW.png" 
            },
            { 
                name: "Persist White", 
                url: "https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/persist-white.JPG" 
            },
            { 
                name: "EZWA Special Collection", 
                url: "https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/17791343971943769684611368319521_eae72e.jpg" 
            }
        ];

        const catalog = document.getElementById('main-catalog');
        const whatsapp = "966502777884";

        products.forEach(p => {
            catalog.innerHTML += `
                <div class="card">
                    <img src="${p.url}" alt="${p.name}">
                    <div class="price">89 ر.س</div>
                    <div class="desc">قطن فاخر 100% | تصميم عصري</div>
                    <a href="https://wa.me/${whatsapp}?text=أهلاً%20عزوة..%20أرغب%20في%20طلب:%20${encodeURIComponent(p.name)}" class="btn">واتساب مباشر</a>
                </div>
            `;
        });
    </script>
</body>
</html>
