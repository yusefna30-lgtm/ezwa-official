<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Official Store</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; padding-bottom: 120px; }
        .brand-header { font-size: 3rem; color: #D4AF37; letter-spacing: -3px; margin: 25px 0; font-weight: bold; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 600px; margin: auto; padding: 10px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; background: #111; }
        .price { color: #D4AF37; font-weight: bold; margin-bottom: 10px; font-size: 1rem; }
        .product-title { font-size: 0.85rem; margin-bottom: 8px; color: #eee; font-weight: bold; }
        .btns { display: flex; flex-direction: column; gap: 8px; }
        .btn-add { background: #D4AF37; color: #000; padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 0.75rem; }
        .btn-info { border: 1px solid #333; color: #fff; padding: 7px; border-radius: 6px; cursor: pointer; background: none; font-size: 0.65rem; }
        #details-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #111; border: 1px solid #D4AF37; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; text-align: right; }
        .close-btn { background: #D4AF37; color: #000; padding: 10px; border-radius: 5px; border: none; cursor: pointer; margin-top: 20px; width: 100%; font-weight: bold; }
        #cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #D4AF37; color: #000; padding: 15px 20px; display: none; justify-content: space-between; align-items: center; font-weight: bold; z-index: 1000; border-radius: 20px 20px 0 0; }
        .btn-order { background: #000; color: #D4AF37; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="brand-header">EZWA</div>
    <div class="container" id="products-grid"></div>

    <div id="details-modal">
        <div class="modal-content">
            <h3 id="m-title" style="color: #D4AF37;"></h3>
            <p id="m-desc"></p>
            <p><strong>🧼 التعليمات:</strong> غسيل بارد - تجنب المبيض.</p>
            <p><strong>📏 المقاسات:</strong> S, M, L, XL, XXL (Oversize).</p>
            <button class="close-btn" onclick="closeModal()">إغلاق</button>
        </div>
    </div>

    <div id="cart-bar">
        <div id="cart-info">القطع: 0 | المجموع: 0 ر.س</div>
        <a href="#" onclick="sendWhatsApp()" class="btn-order">إرسال الطلب ✅</a>
    </div>

    <script>
        // رابط المستودع الخاص بك
        const baseURL = "https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/";

        // هذه هي القائمة المحدثة بالأسماء التي اخترتها أنت في جيت هاب
        const products = [
            { id: 1, name: "PURE", img: "TSHIRT PURE.png", price: 115, desc: "قطن فاخر 100% - رسم تجريدي أبيض" },
            { id: 2, name: "GHOST", img: "TSHIRT GHOST.png", price: 115, desc: "لون رملي مميز - قصة واسعة" },
            { id: 3, name: "FLOW", img: "TSHIRT FLOW.png", price: 115, desc: "ضربة فرشاة فنية - قماش معالج" },
            { id: 4, name: "MIND", img: "TSHIRT DATA.png", price: 115, desc: "تصميم فني عصري - مريح جداً" }
        ];

        let cart = [];
        const grid = document.getElementById('products-grid');

        // بناء المتجر تلقائياً
        products.forEach((p) => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${baseURL + encodeURIComponent(p.img)}" alt="${p.name}">
                    <div class="product-title">${p.name}</div>
                    <div class="price">${p.price} ر.س</div>
                    <div class="btns">
                        <button class="btn-add" onclick="addToCart(${p.id})">➕ أضف للطلب</button>
                        <button class="btn-info" onclick="showDetails('${p.name}', '${p.desc}')">ℹ️ التفاصيل</button>
                    </div>
                </div>
            `;
        });

        function showDetails(name, desc) {
            document.getElementById('m-title').innerText = name;
            document.getElementById('m-desc').innerHTML = "<strong>🧶 الوصف:</strong> " + desc;
            document.getElementById('details-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('details-modal').style.display = 'none'; }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            cart.push(product);
            document.getElementById('cart-bar').style.display = 'flex';
            updateCartBar();
        }

        function updateCartBar() {
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            document.getElementById('cart-info').innerText = `القطع: ${cart.length} | المجموع: ${total} ر.س`;
        }

        function sendWhatsApp() {
            let message = "أهلاً عزوة، أرغب في طلب:\n\n";
            cart.forEach((p, i) => { message += `${i + 1}- ${p.name}\n`; });
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            message += `\n💰 المجموع: ${total} ر.س`;
            window.open(`https://wa.me/966502777884?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
