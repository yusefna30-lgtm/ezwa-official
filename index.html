<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Official | عزوة</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial', sans-serif; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #D4AF37; letter-spacing: -2px; font-size: 3rem; margin: 40px 0 10px 0; font-weight: bold; }
        .tagline { color: #D4AF37; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 50px; opacity: 0.9; }
        
        /* تصميم الكتالوج (الجمال) */
        .catalog { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px;
        }
        .catalog-item { position: relative; overflow: hidden; border-radius: 15px; border: 1px solid #1a1a1a; transition: 0.4s; }
        .catalog-item:hover { border-color: #D4AF37; transform: translateY(-5px); }
        .catalog-item img { width: 100%; height: auto; display: block; filter: grayscale(20%); transition: 0.5s; }
        .catalog-item:hover img { filter: grayscale(0%); transform: scale(1.05); }
        
        .footer { margin-top: 60px; color: #D4AF37; font-size: 12px; opacity: 0.6; }
    </style>
</head>
<body>
    <h1>EZWA</h1>
    <p class="tagline">Premium Streetwear & Fashion</p>

    <div class="catalog">
        <div class="catalog-item"><img src="https://via.placeholder.com/600x800/111/D4AF37?text=EZWA+COLLECTION+1" alt="EZWA Fashion"></div>
        <div class="catalog-item"><img src="https://via.placeholder.com/600x800/111/D4AF37?text=EZWA+COLLECTION+2" alt="EZWA Fashion"></div>
        <div class="catalog-item"><img src="https://via.placeholder.com/600x800/111/D4AF37?text=EZWA+COLLECTION+3" alt="EZWA Fashion"></div>
    </div>

    <div class="footer">© 2026 EZWA. All Rights Reserved.</div>
</body>
</html>
