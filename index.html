<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Catalog</title>
    <style>
        body { font-family: sans-serif; background-color: #000; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .brand-header { font-size: 2.5rem; color: #D4AF37; margin: 20px 0; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; max-width: 1000px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; padding: 10px; }
        .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 8px; background: #111; }
        .price { color: #D4AF37; font-weight: bold; font-size: 1.2rem; margin: 5px 0; }
        .btn { display: block; background: #D4AF37; color: #000; padding: 8px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="brand-header">EZWA</div>

    <div class="grid" id="catalog"></div>

    <script>
        // وزنية الأسماء بالملي (حروف كبيرة وصغيرة)
        const products = [
            { name: "RAW Box Edition", file: "TSHIRT BOX RAW.png" },
            { name: "Persist White", file: "persist-white.jpg" },
            { name: "EZWA Collection", file: "17791343971943769684611368319521_eae72e.jpg" }
        ];

        const container = document.getElementById('catalog');
        const phone = "966502777884";

        products.forEach(p => {
            // معالجة المسافات عشان المتصفح ما يضيع
            const encodedFile = encodeURIComponent(p.file);
            container.innerHTML += `
                <div class="card">
                    <img src="${encodedFile}" alt="${p.name}">
                    <div class="price">89 ر.س</div>
                    <a href="https://wa.me/${phone}?text=أهلاً%20عزوة..%20أطلب:%20${encodeURIComponent(p.name)}" class="btn">واتساب مباشر</a>
                </div>
            `;
        });
    </script>
</body>
</html>
