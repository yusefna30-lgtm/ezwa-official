<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Official Store</title>
    
    <!-- خط تجول المتناسق مع الواجهات الرقمية الحديثة -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
 <style>
    body { 
        /* الخلفية المتدرجة العميقة لبنك فيجن */
        background: radial-gradient(circle at 50% 0%, #1a144e 0%, #07051a 100%) no-repeat fixed;
        color: #ffffff; 
        text-align: center; 
        font-family: 'Tajawal', sans-serif; 
        margin: 0; 
        padding: 10px 10px 120px 10px; 
        min-height: 100vh;
    }
    
    .brand-header { 
        font-size: 3rem; 
        font-weight: 700;
        background: linear-gradient(180deg, #ffffff 0%, #8b90af 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 40px 0; 
        letter-spacing: 2px;
    }
    
    .container { 
        display: grid; grid-template-columns: 1fr 1fr; gap: 15px; 
        max-width: 600px; margin: auto; 
    }
    
    .card { 
        /* تأثير الزجاج المتجمد الفاخر */
        background: rgba(255, 255, 255, 0.03); 
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1); 
        border-radius: 28px; 
        padding: 15px; 
        transition: 0.4s ease;
        box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }

    .card:hover {
        transform: translateY(-8px);
        border-color: rgba(0, 229, 255, 0.4);
        box-shadow: 0 20px 40px rgba(0, 229, 255, 0.1);
    }
    
    .card img { 
        width: 100%; height: 180px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; 
    }
    
    .price { 
        color: #00e5ff; font-weight: 700; font-size: 1.3rem; 
        text-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
        margin-bottom: 12px;
    }
    
    .product-title { font-size: 1rem; color: #ffffff; font-weight: bold; margin-bottom: 12px; }

    .btns { display: flex; flex-direction: column; gap: 10px; }
    
    .btn-add { 
        background: linear-gradient(90deg, #00e5ff 0%, #0080ff 100%);
        color: #0c0827; padding: 14px; border-radius: 16px; border: none; font-weight: bold; 
        cursor: pointer; font-family: 'Tajawal', sans-serif;
        box-shadow: 0 5px 15px rgba(0, 229, 255, 0.3);
    }
    
    .btn-info, .btn-vid { 
        background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
        color: #ffffff; padding: 10px; border-radius: 12px; text-decoration: none; font-size: 0.8rem;
    }

    #cart-bar { 
        position: fixed; bottom: 0; left: 0; right: 0; 
        background: rgba(0, 229, 255, 0.9); backdrop-filter: blur(20px);
        color: #0c0827; padding: 18px 25px; display: none; justify-content: space-between; 
        align-items: center; font-weight: bold; z-index: 1000; border-radius: 30px 30px 0 0; 
    }
</style>
    </style>
</head>
<body>

    <div class="brand-header">EZWA</div>
    
    <div class="container" id="products-grid"></div>

    <div id="details-modal">
        <div class="modal-content">
            <h3 id="m-title" style="color: #00e5ff;"></h3>
            <p id="m-desc"></p>
            <p><strong>🧼 التعليمات:</strong> غسيل بارد - تجنب المبيض.</p>
            <p><strong>📏 المقاسات:</strong> S, M, L, XL, XXL (Oversize).</p>
            <button class="close-btn" onclick="closeModal()">إغلاق</button>
        </div>
    </div>

    <div id="cart-bar">
        <div id="cart-info">القطع: 0 | المجموع: 0 ر.س</div>
        <a href="#" onclick="sendWhatsApp()" class="btn-order">إرسال الطلب ✅</a>
    </div>
    <script>
        const baseURL = "https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/";
        const videoLink = "https://vt.tiktok.com/ZSxRBGRQT/";

        const products = [
            { id: 1, name: "GHOST", img: "TSHIRT GHOST.png", price: 115, desc: "لون رملي مميز - قصة واسعة مريحة" },
            { id: 2, name: "PURE", img: "TSHIRT PURE.png", price: 115, desc: "قطن فاخر 100% - رسم تجريدي على الظهر" },
            { id: 3, name: "FLOW", img: "TSHIRT FLOW.png", price: 115, desc: "ضربة فرشاة فنية - قماش معالج" },
            { id: 4, name: "MIND", img: "TSHIRT DATA.png", price: 115, desc: "تصميم فني عصري - إصدار محدود" }
        ];

        let cart = [];
        const grid = document.getElementById('products-grid');

        products.forEach((p) => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${baseURL + encodeURIComponent(p.img)}" alt="${p.name}">
                    <div class="product-title">${p.name}</div>
                    <div class="price">${p.price} ر.س</div>
                    <div class="btns">
                        <button class="btn-add" onclick="addToCart(${p.id})">➕ أضف للطلب</button>
                        <button class="btn-info" onclick="showDetails('${p.name}', '${p.desc}')">ℹ️ التفاصيل</button>
                        <a href="${videoLink}" target="_blank" class="btn-vid">🎬 فيديو</a>
                    </div>
                </div>
            `;
        });

        function showDetails(name, desc) {
            document.getElementById('m-title').innerText = name;
            document.getElementById('m-desc').innerHTML = "<strong>🧶 الوصف:</strong> " + desc;
            document.getElementById('details-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('details-modal').style.display = 'none'; }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            cart.push(product);
            document.getElementById('cart-bar').style.display = 'flex';
            updateCartBar();
        }

        function updateCartBar() {
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            document.getElementById('cart-info').innerText = `القطع: ${cart.length} | المجموع: ${total} ر.س`;
        }

        function sendWhatsApp() {
            let message = "أهلاً عزوة، أرغب في طلب هذه المنتجات (هوية فيجن):\n\n";
            cart.forEach((p, i) => { message += `${i + 1}- ${p.name}\n`; });
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            message += `\n💰 المجموع الإجمالي: ${total} ر.س`;
            window.open(`https://wa.me/966502777884?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
