<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Catalog - كتالوج عزوة</title>
    <style>
        body { font-family: sans-serif; background-color: #000; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .brand-header { font-size: 2.5rem; color: #D4AF37; letter-spacing: 4px; margin: 30px 0; font-weight: bold; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 15px; transition: 0.3s; }
        .card img { width: 100%; height: 350px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; background: #111; }
        .price { color: #D4AF37; font-weight: bold; font-size: 1.4rem; }
        .desc { color: #888; font-size: 0.9rem; margin-bottom: 15px; }
        .btn { display: block; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-bottom: 10px; }
        .btn-wa { background-color: #D4AF37; color: #000; }
        .btn-video { border: 1px solid #333; color: #D4AF37; }
    </style>
</head>
<body>

    <div class="brand-header">EZWA</div>

    <div class="container" id="catalog"></div>

    <script>
        const products = [
            { name: "RAW Box Edition", file: "https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/TSHIRT%20BOX%20RAW.png" },
            { name: "Persist White", file: "https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/persist-white.jpg" },
            { name: "New Collection Blue", file: "https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/17791343971943769684611368319521_eae72e.jpg" }
        ];

        const container = document.getElementById('catalog');
        const phone = "966502777884";

        products.forEach(p => {
            container.innerHTML += `
                <div class="card">
                    <img src="${p.file}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/350x450/111/D4AF37?text=EZWA'">
                    <div class="price">89 ر.س</div>
                    <div class="desc">قطن فاخر 100% | قصة Oversized</div>
                    <a href="https://wa.me/${phone}?text=أهلاً%20عزوة..%20أرغب%20في%20طلب:%20${encodeURIComponent(p.name)}" class="btn btn-wa" target="_blank">واتساب مباشر</a>
                    <a href="#" class="btn btn-video">مشاهدة الفيديو</a>
                </div>
            `;
        });
    </script>
</body>
</html>
