<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Catalog - كتالوج عزوة</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #000; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .logo { width: 150px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #d4af37; }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .price { font-size: 20px; color: #d4af37; font-weight: bold; margin: 10px 0; }
        .desc { font-size: 13px; color: #888; margin-bottom: 15px; }
        .btn { display: block; background: #d4af37; color: #000; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-bottom: 10px; }
        .btn-video { background: transparent; color: #d4af37; border: 1px solid #d4af37; }
    </style>
</head>
<body>

    <img src="https://github.com/ezwa-official/ezwa-official/blob/main/logo.png?raw=true" alt="EZWA" class="logo">

    <div class="grid" id="catalog"></div>

    <script>
        // هنا قائمة الصور (عدلها مثل ما تعلمت JPG أو PNG)
        const images = [
            "تيشيرت بوكس RAW.jpg",
            "17791343971943769684611368319521_eae72e.jpg",
            "persist-white.jpg" // أضف هنا أي أسماء صور جديدة ترفعها
        ];

        const catalogContainer = document.getElementById('catalog');
        const phoneNumber = "966502777884";

        images.forEach(imgName => {
            const cleanName = imgName.split('.')[0]; // اسم المنتج بدون الصيغة
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${imgName}" alt="${cleanName}">
                <div class="price">89 ر.س</div>
                <div class="desc">قطن فاخر 100% | قصة Oversized</div>
                <a href="https://wa.me/${phoneNumber}?text=أهلاً%20عزوة..%20أرغب%20في%20طلب%20منتج:%20${encodeURIComponent(cleanName)}%20بسعر%2089%20ر.س" class="btn">واتساب مباشر</a>
                <a href="#" class="btn btn-video">مشاهدة الفيديو</a>
            `;
            catalogContainer.appendChild(card);
        });
    </script>
</body>
</html>
