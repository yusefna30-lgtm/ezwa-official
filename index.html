<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Store</title>
    <style>
        /* التنسيق العام */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #000; 
            color: #fff; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }

        .brand { 
            font-size: 3.5rem; 
            color: #D4AF37; 
            margin: 50px 0; 
            font-weight: bold; 
            letter-spacing: 8px;
            text-shadow: 2px 2px 10px rgba(212, 175, 55, 0.3);
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 40px; 
            max-width: 1200px; 
            margin: auto; 
            padding: 20px;
        }

        /* كرت المنتج المطور */
        .card { 
            background: rgba(26, 26, 26, 0.6); /* خلفية شبه شفافة */
            border: 1px solid #333; 
            border-radius: 25px; 
            padding: 25px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px); /* تأثير التغبيش الخلفي */
        }

        .card:hover {
            transform: translateY(-15px);
            border-color: #D4AF37;
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.2);
        }

        /* تنسيق اسم المنتج */
        .product-name {
            font-size: 1.4rem;
            color: #eee;
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* إصلاح وتحسين الصور */
        .card img { 
            width: 100%; 
            height: 350px; 
            object-fit: cover; /* يضمن ملء الصورة للمساحة دون تمطط */
            border-radius: 15px; 
            background: #111; 
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        .price { 
            color: #D4AF37; 
            font-weight: bold; 
            font-size: 2rem; 
            margin-bottom: 20px; 
        }

        .btn { 
            display: block; 
            background: #D4AF37; 
            color: #000; 
            padding: 18px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.1rem; 
            transition: 0.3s;
            margin-bottom: 15px;
        }

        .btn:hover {
            background: #fff;
            transform: scale(1.02);
        }

        .share-btn {
            background: none;
            border: 1px solid #444;
            color: #888;
            padding: 10px;
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .share-btn:hover {
            color: #fff;
            border-color: #D4AF37;
        }
    </style>
</head>
<body>

    <div class="brand">EZWA</div>

    <div class="grid">
        <div class="card">
            <div class="product-name">RAW Box</div>
            <img src="https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/TSHIRT%20BOX%20RAW.png" alt="RAW Box">
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884?text=أرغب%20في%20طلب%20بوكس%20RAW" class="btn">واتساب مباشر</a>
            <button class="share-btn" onclick="share('RAW Box')">🔗 مشاركة المنتج</button>
        </div>

        <div class="card">
            <div class="product-name">Persist White</div>
            <img src="https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/persist-white.JPG" alt="Persist White">
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884?text=أرغب%20في%20طلب%20تيشيرت%20Persist" class="btn">واتساب مباشر</a>
            <button class="share-btn" onclick="share('Persist White')">🔗 مشاركة المنتج</button>
        </div>

        <div class="card">
            <div class="product-name">EZWA Collection</div>
            <img src="https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/17791343971943769684611368319521_eae72e.jpg" alt="EZWA Collection">
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884?text=أرغب%20في%20طلب%20تيشيرت%20عزوة" class="btn">واتساب مباشر</a>
            <button class="share-btn" onclick="share('EZWA Collection')">🔗 مشاركة المنتج</button>
        </div>
    </div>

    <script>
        function share(title) {
            if (navigator.share) {
                navigator.share({ title: title, url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('تم نسخ الرابط!');
            }
        }
    </script>

</body>
</html>
