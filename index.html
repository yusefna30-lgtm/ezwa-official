<style>
    /* التنسيق الجديد لزر المشاركة */
    .btn-share { 
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        background: rgba(212, 175, 55, 0.05); /* خلفية ذهبية خفيفة جداً */
        border: 1px dashed #D4AF37; /* إطار ذهبي منقط يعطي طابعاً مميزاً */
        color: #D4AF37; 
        padding: 10px; 
        border-radius: 8px; 
        text-decoration: none; 
        font-size: 0.75rem; 
        cursor: pointer; 
        transition: all 0.3s ease;
        margin-top: 5px;
    }

    .btn-share:hover {
        background: #D4AF37;
        color: #000;
        border-style: solid;
        transform: scale(1.03);
    }

    /* تحسين شكل الأيقونة داخل الزر */
    .share-icon {
        font-size: 1rem;
    }
</style>

<script>
    function shareProduct(productName) {
        const shareData = {
            title: 'متجر عزوة - ' + productName,
            text: 'شوف هذا المنتج الرهيب من عزوة: ' + productName,
            url: window.location.href
        };

        if (navigator.share) {
            navigator.share(shareData)
                .then(() => console.log('تمت المشاركة بنجاح'))
                .catch((err) => console.log('خطأ في المشاركة: ', err));
        } else {
            // حل بديل للمتصفحات التي لا تدعم المشاركة (مثل الكمبيوتر)
            navigator.clipboard.writeText(window.location.href);
            
            // إظهار تنبيه أنيق بدلاً من الـ alert التقليدي
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = "✅ تم النسخ!";
            setTimeout(() => { btn.innerHTML = originalText; }, 2000);
        }
    }
</script>
