<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        html, body { background-color: #050505 !important; margin: 0; padding: 0; overflow-x: hidden; }
        body { 
            background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 80%) no-repeat fixed !important;
            color: #ffffff; text-align: center; font-family: 'Tajawal', sans-serif; padding: 20px 10px 150px 10px; min-height: 100vh;
        }
        
        /* حركة التوهج خلف الصور */
        @keyframes glow-pulse {
            0% { box-shadow: 0 0 20px rgba(0, 229, 255, 0.1); }
            50% { box-shadow: 0 0 45px rgba(0, 151, 255, 0.25); }
            100% { box-shadow: 0 0 20px rgba(0, 229, 255, 0.1); }
        }

        .brand-header { font-size: 3rem; font-weight: 900; background: linear-gradient(180deg, #ffffff 40%, #777777 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 30px 0; letter-spacing: 5px; }
        
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: auto; }
        
        .card { 
            background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 25px; padding: 12px; 
            display: flex; flex-direction: column; justify-content: space-between;
            transition: 0.3s; 
            animation: glow-pulse 4s infinite ease-in-out;
        }
        
        .card:hover { border-color: #00e5ff; box-shadow: 0 0 35px rgba(0, 229, 255, 0.5) !important; transform: translateY(-5px); }

        .img-container { position: relative; width: 100%; height: 170px; margin-bottom: 12px; overflow: hidden; border-radius: 18px; }
        
        /* الشادو المتحرك الدوار خلف التيشيرت */
        .img-container::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 180deg, transparent, #00e5ff, transparent, #001eff, transparent);
            animation: rotate-bg 8s linear infinite;
            opacity: 0.15; z-index: 0;
        }
        @keyframes rotate-bg { 100% { transform: rotate(360deg); } }

        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 18px; position: relative; z-index: 1; background: #000; }
        
        .zoom-icon { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: #00e5ff; padding: 5px; border-radius: 50%; cursor: pointer; font-size: 12px; border: 1px solid #00e5ff; z-index: 5; }

        /* تنسيق أزرار التنقل بين الصور */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7); color: #00e5ff; border: 1px solid #00e5ff;
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            font-weight: bold; font-size: 14px; z-index: 5;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .nav-btn:hover { background: #00e5ff; color: #000; box-shadow: 0 0 10px #00e5ff; }
        .prev-btn { right: 8px; } 
        .next-btn { left: 8px; }  

        .product-title { font-size: 0.95rem; font-weight: 700; color: #ffffff; margin-bottom: 5px; }
        .price { color: #00e5ff; font-weight: 800; font-size: 1.15rem; margin-bottom: 10px; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
        
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 12px; border: 1px solid #1a1a1a; }
        .qty-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; width: 28px; height: 28px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .qty-val { font-weight: bold; color: #00e5ff; }

        .btns { display: flex; flex-direction: column; gap: 8px; }
        .btn-add { background: #00e5ff; color: #000; border: none; padding: 14px; border-radius: 14px; font-weight: 900; cursor: pointer; box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); }
        
        .sub-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-info, .btn-vid { background: rgba(255,255,255,0.03); color: #888; border: 1px solid #222; padding: 10px; border-radius: 10px; font-size: 0.7rem; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; }

        #cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0, 229, 255, 0.95); backdrop-filter: blur(15px); color: #000; padding: 15px 20px; display: none; flex-direction: column; gap: 12px; z-index: 1000; border-radius: 25px 25px 0 0; }
        .btn-order { flex: 2; background: #000; color: #00e5ff; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; text-align: center; }
        .btn-clear { flex: 1; background: #ff3b3b; color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        #details-modal, #zoom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(15px); }
        .modal-content { background: #0a0a0a; border: 1px solid #00e5ff; padding: 30px; border-radius: 25px; width: 85%; max-width: 350px; }
        .zoom-content img { max-width: 90%; max-height: 80vh; border-radius: 20px; border: 2px solid #00e5ff; }
    </style>
</head>
<body>

    <div class="brand-header">EZWA</div>
    
    <div class="container" id="products-grid"></div>

    <div id="zoom-modal" onclick="this.style.display='none'">
        <div class="zoom-content"><img id="zoomed-img" src=""></div>
    </div>

    <div id="details-modal">
        <div class="modal-content">
            <h2 id="m-title" style="color: #00e5ff; margin-bottom: 15px;"></h2>
            <p id="m-desc" style="line-height:1.6; color:#ccc;"></p>
            <button onclick="document.getElementById('details-modal').style.display='none'" style="background:#00e5ff; border:none; padding:12px; width:100%; border-radius:12px; font-weight:bold; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <div id="cart-bar">
        <div id="cart-info" style="font-weight:bold;">القطع: 0 | المجموع: 0 ر.س</div>
        <div style="display:flex; gap:10px; width:100%;">
            <a href="javascript:void(0)" onclick="sendWhatsApp()" class="btn-order">تأكيد الطلب ✅</a>
            <button onclick="clearCart()" class="btn-clear">تصفير 🗑️</button>
        </div>
    </div>

    <script>
        const baseURL = "https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/";
        const tiktokLink = "https://vt.tiktok.com/ZSxRBGRQT/";

        // قائمة المنتجات محدثة بجميع الألوان الـ 4
        const products = [
            { 
                id: 1, 
                name: "PERSIST - White", 
                img: ["persist-white-blue.png.png", "persist-white-blue1.png.jpg"], 
                currentImgIndex: 0, 
                price: 115, 
                desc: "PERSIST (أبيض/أزرق): أصالة التصميم الرياضي الكلاسيكي يمتزج مع عصرية الـ Streetwear." 
            },
            { 
                id: 2, 
                name: "PERSIST - Black", 
                img: ["persist-black-blue.png.png", "persist-black-blue2.png.jpg"], 
                currentImgIndex: 0, 
                price: 115, 
                desc: "PERSIST (أسود/أزرق): تصميم رياضي كلاسيكي بلون أسود أنيق يعكس القوة." 
            },
            { 
                id: 3, 
                name: "PERSIST - Green", 
                img: ["persist-green-blue.png.png", "persist-green-blue3.png.jpg"], 
                currentImgIndex: 0, 
                price: 115, 
                desc: "PERSIST (أخضر/أزرق): لون أخضر مميز يمنحك حضوراً فريداً وأناقة لافتة." 
            },
            { 
                id: 4, 
                name: "PERSIST - Yellow", 
                img: ["persist-yellow-black.png.png", "persist-yellow-black4.png.jpg"], 
                currentImgIndex: 0, 
                price: 115, 
                desc: "PERSIST (أصفر/أسود): مزيج جريء من الأصفر والأسود يعكس طاقة وإطلالة عصرية." 
            }
        ];

        let cart = [];
        const grid = document.getElementById('products-grid');

        function render() {
            grid.innerHTML = "";
            products.forEach(p => {
                const currentImgName = p.img[p.currentImgIndex];
                const fullImgURL = baseURL + encodeURIComponent(currentImgName);

                const showButtons = p.img.length > 1;

                grid.innerHTML += `
                    <div class="card">
                        <div class="img-container">
                            ${showButtons ? `<button class="nav-btn prev-btn" onclick="changeImage(${p.id}, 1)">&gt;</button>` : ''}
                            <img id="prod-img-${p.id}" src="${fullImgURL}" alt="${p.name}">
                            ${showButtons ? `<button class="nav-btn next-btn" onclick="changeImage(${p.id}, -1)">&lt;</button>` : ''}
                            <div class="zoom-icon" onclick="openZoomFromProduct(${p.id})">🔍</div>
                        </div>
                        <div class="product-title">${p.name}</div>
                        <div class="price">${p.price} ر.س</div>
                        <div class="qty-control">
                            <button class="qty-btn" onclick="updateQty(${p.id}, -1)">-</button>
                            <span class="qty-val" id="qty-${p.id}">1</span>
                            <button class="qty-btn" onclick="updateQty(${p.id}, 1)">+</button>
                        </div>
                        <div class="btns">
                            <button class="btn-add" onclick="addToCart(${p.id})">أضف للسلة</button>
                            <div class="sub-btns">
                                <button class="btn-info" onclick="showDetails('${p.name}', '${p.desc}')">ℹ️ التفاصيل</button>
                                <a href="${tiktokLink}" target="_blank" class="btn-vid">🎬 فيديو</a>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function changeImage(id, direction) {
            const p = products.find(x => x.id === id);
            if (!p) return;

            p.currentImgIndex += direction;
            if (p.currentImgIndex >= p.img.length) p.currentImgIndex = 0;
            if (p.currentImgIndex < 0) p.currentImgIndex = p.img.length - 1;

            const nextImgName = p.img[p.currentImgIndex];
            document.getElementById(`prod-img-${id}`).src = baseURL + encodeURIComponent(nextImgName);
        }

        function updateQty(id, chg) {
            let el = document.getElementById(`qty-${id}`);
            let v = parseInt(el.innerText) + chg;
            if (v >= 1) el.innerText = v;
        }

        function openZoomFromProduct(id) {
            const p = products.find(x => x.id === id);
            const currentImgName = p.img[p.currentImgIndex];
            document.getElementById('zoomed-img').src = baseURL + encodeURIComponent(currentImgName);
            document.getElementById('zoom-modal').style.display = 'flex';
        }

        function showDetails(n, d) { document.getElementById('m-title').innerText = n; document.getElementById('m-desc').innerText = d; document.getElementById('details-modal').style.display = 'flex'; }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            const q = parseInt(document.getElementById(`qty-${id}`).innerText);
            const currentImgName = p.img[p.currentImgIndex];
            for(let i=0; i<q; i++) {
                cart.push({
                    name: p.name,
                    price: p.price,
                    colorImg: currentImgName
                });
            }
            document.getElementById('cart-bar').style.display = 'flex';
            updateCart();
            document.getElementById(`qty-${id}`).innerText = "1";
        }

        function clearCart() { if(confirm("تصفير السلة؟")) { cart = []; document.getElementById('cart-bar').style.display = 'none'; updateCart(); } }
        function updateCart() {
            const t = cart.reduce((s, x) => s + x.price, 0);
            document.getElementById('cart-info').innerText = `القطع: ${cart.length} | المجموع: ${t} ر.س`;
        }

        function sendWhatsApp() {
            let s = {}; cart.forEach(x => s[x.name] = (s[x.name] || 0) + 1);
            let m = "طلب جديد من عزوة:\n";
            for(let k in s) m += `- ${k} (عدد: ${s[k]})\n`;
            m += `\n💰 الإجمالي: ${cart.reduce((a,b)=>a+b.price,0)} ر.س`;
            window.open(`https://wa.me/966502777884?text=${encodeURIComponent(m)}`);
        }

        render();
    </script>

    <div class="footer-container">
        <div class="footer-column">
            <h3>توثيق المركز السعودي للأعمال</h3>
            <p>رقم : <span style="color: #ffffff; font-family: monospace; letter-spacing: 1px;">0000196691</span></p>
        </div>
        <div class="footer-bottom">
            <p>حقوق النشر © ezwa.net جميع الحقوق محفوظة 2026.</p>
        </div>
    </div>
</body>
</html>
