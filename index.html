<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Official Store</title>
    <style>
        body { font-family: sans-serif; background-color: #000; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .brand-header { font-size: 2.5rem; color: #D4AF37; margin: 30px 0; font-weight: bold; letter-spacing: 3px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 15px; }
        .card img { width: 100%; height: 320px; object-fit: cover; border-radius: 10px; background: #111; margin-bottom: 15px; }
        .price { color: #D4AF37; font-weight: bold; font-size: 1.4rem; margin-bottom: 5px; }
        .btn { display: block; background: #D4AF37; color: #000; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="brand-header">EZWA</div>

    <div class="grid" id="catalog"></div>

    <script>
        // أضفنا رقم نسخة (v=100) خلف كل صورة عشان نجبر المتصفح يحدّثها الحين
        const items = [
            { name: "RAW Box Edition", file: "TSHIRT%20BOX%20RAW.png?v=100" },
            { name: "Persist White", file: "persist-white.JPG?v=100" },
            { name: "New Collection", file: "17791343971943769684611368319521_eae72e.jpg?v=100" }
        ];

        const catalog = document.getElementById('catalog');
        const wa = "966502777884";

        items.forEach(p => {
            catalog.innerHTML += `
                <div class="card">
                    <img src="${p.file}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300x400/111/D4AF37?text=EZWA'">
                    <div class="price">89 ر.س</div>
                    <a href="https://wa.me/${wa}?text=أرغب%20في%20طلب:%20${p.name}" class="btn">واتساب مباشر</a>
                </div>
            `;
        });
    </script>
</body>
</html>
