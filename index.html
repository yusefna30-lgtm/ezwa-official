<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Catalog</title>
    <style>
        body { font-family: sans-serif; background-color: #000; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .brand-header { font-size: 2.5rem; color: #D4AF37; margin: 30px 0; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 15px; }
        .card img { width: 100%; height: 350px; object-fit: cover; border-radius: 10px; background: #111; margin-bottom: 15px; }
        .price { color: #D4AF37; font-weight: bold; font-size: 1.4rem; margin-bottom: 10px; }
        .btn { display: block; background: #D4AF37; color: #000; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="brand-header">EZWA</div>

    <div class="grid">
        <div class="card">
            <img src="TSHIRT BOX RAW.png" onerror="this.src='https://via.placeholder.com/350x450/111/D4AF37?text=RAW+BOX'">
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884?text=طلب%20تيشيرت%20RAW" class="btn">واتساب مباشر</a>
        </div>

        <div class="card">
            <img src="persist-white.JPG" onerror="this.src='https://via.placeholder.com/350x450/111/D4AF37?text=PERSIST'">
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884?text=طلب%20تيشيرت%20Persist" class="btn">واتساب مباشر</a>
        </div>

        <div class="card">
            <img src="17791343971943769684611368319521_eae72e.jpg" onerror="this.src='https://via.placeholder.com/350x450/111/D4AF37?text=EZWA+COLLECTION'">
            <div class="price">89 ر.س</div>
            <a href="https://wa.me/966502777884?text=طلب%20تيشيرت%20عزوة" class="btn">واتساب مباشر</a>
        </div>
    </div>

</body>
</html>
