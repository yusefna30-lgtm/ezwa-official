<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        html, body { background-color: #050505 !important; margin: 0; padding: 0; overflow-x: hidden; }
        body { 
            background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 80%) no-repeat fixed !important;
            color: #ffffff; text-align: center; font-family: 'Tajawal', sans-serif; padding: 40px 10px 150px 10px; min-height: 100vh;
        }
        .brand-header { font-size: 3.5rem; font-weight: 900; background: linear-gradient(180deg, #ffffff 40%, #777777 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 50px; letter-spacing: 5px; }
        
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: auto; }
        
        .card { 
            background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 25px; padding: 12px; 
            display: flex; flex-direction: column; justify-content: space-between;
            transition: 0.3s; box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }
        .card:hover { border-color: #00e5ff; box-shadow: 0 0 25px rgba(0, 229, 255, 0.3); }

        .img-container { position: relative; width: 100%; height: 170px; margin-bottom: 15px; }
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 18px; }
        
        /* زر التكبير الصغير فوق الصورة */
        .zoom-icon { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: #00e5ff; padding: 5px; border-radius: 50%; cursor: pointer; font-size: 12px; border: 1px solid #00e5ff; }

        .product-title { font-size: 0.9rem; font-weight: 700; color: #ffffff; margin-bottom: 5px; }
        .price { color: #00e5ff; font-weight: 800; font-size: 1.1rem; margin-bottom: 10px; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
        
        /* التحكم بالكمية */
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 10px; }
        .qty-btn { background: none; border: 1px solid #333; color: #fff; width: 25px; height: 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .qty-val { font-weight: bold; color: #00e5ff; }

        .btns { display: flex; flex-direction: column; gap: 6px; }
        .btn-add { background: #00e5ff; color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: 900; cursor: pointer; box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); }
        .btn-info { background: rgba(255,255,255,0.02); color: #777; border: 1px solid #1a1a1a; padding: 8px; border-radius: 10px; font-size: 0.7rem; cursor: pointer; }

        /* شريط السلة المطور */
        #cart-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0, 229, 255, 0.95); 
            backdrop-filter: blur(15px); color: #000; padding: 15px 20px; display: none; flex-direction: column; gap: 10px; z-index: 1000; border-radius: 25px 25px 0 0; 
        }
        .cart-top { display: flex; justify-content: space-between; align-items: center; width: 100%; font-weight: bold; }
        .cart-actions { display: flex; gap: 10px; width: 100%; }
        .btn-order { flex: 2; background: #000; color: #00e5ff; padding: 12px; border-radius: 12px; text-decoration: none; font-weight: bold; text-align: center; }
        .btn-clear { flex: 1; background: #ff3b3b; color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* المودال (التكبير والتفاصيل) */
        #details-modal, #zoom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-content { background: #0a0a0a; border: 1px solid #00e5ff; padding: 25px; border-radius: 25px; width: 85%; max-width: 350px; }
        .zoom-content img { max-width: 90%; max-height: 80vh; border-radius: 15px; border: 2px solid #00e5ff; }
    </style>
</head>
<body>

    <div class="brand-header">EZWA</div>
    
    <div class="container" id="products-grid"></div>

    <div id="zoom-modal" onclick="this.style.display='none'">
        <div class="zoom-content">
            <img id="zoomed-img" src="">
        </div>
    </div>

    <div id="details-modal">
        <div class="modal-content">
            <h3 id="m-title" style="color: #00e5ff; margin-bottom:15px;"></h3>
            <p id="m-desc" style="line-height:1.6; color:#ccc; font-size:0.9rem;"></p>
            <button onclick="document.getElementById('details-modal').style.display='none'" style="background:#00e5ff; border:none; padding:10px; width:100%; border-radius:10px; font-weight:bold; margin-top:15px;">إغلاق</button>
        </div>
    </div>

    <div id="cart-bar">
        <div class="cart-top">
            <div id="cart-info">القطع: 0 | المجموع: 0 ر.س</div>
        </div>
        <div class="cart-actions">
            <a href="#" onclick="sendWhatsApp()" class="btn-order">تأكيد الطلب ✅</a>
            <button onclick="clearCart()" class="btn-clear">تصفير 🗑️</button>
        </div>
    </div>

    <script>
        const baseURL = "https://raw.githubusercontent.com/yusefna30-lgtm/ezwa-official/main/";
        const products = [
            { id: 1, name: "GHOST", img: "TSHIRT BOX RAW10.png.png", price: 115, desc: "تيشيرت GHOST: قماش فاخر، قصة أوفر سايز، طباعة ثنائية الأبعاد." },
            { id: 2, name: "PURE", img: "TSHIRT BOX RAW.png.png", price: 115, desc: "تيشيرت PURE: قطن 100%، راحة قصوى وتصميم نقي." },
            { id: 3, name: "FLOW", img: "TSHIRT BOX RAW11.png.png", price: 115, desc: "تيشيرت FLOW: انسيابية عصرية تناسب أسلوب حياتك." },
            { id: 4, name: "MIND", img: "TSHIRT BOX RAW12.png.png", price: 115, desc: "تيشيرت MIND: للمبدعين الذين يبحثون عن التميز." }
        ];

        let cart = [];
        const grid = document.getElementById('products-grid');

        products.forEach((p) => {
            grid.innerHTML += `
                <div class="card">
                    <div class="img-container">
                        <img src="${baseURL + encodeURIComponent(p.img)}" alt="${p.name}" id="img-${p.id}">
                        <div class="zoom-icon" onclick="openZoom('${baseURL + encodeURIComponent(p.img)}')">🔍</div>
                    </div>
                    <div class="product-title">${p.name}</div>
                    <div class="price">${p.price} ر.س</div>
                    
                    <div class="qty-control">
                        <button class="qty-btn" onclick="updateQty(${p.id}, -1)">-</button>
                        <span class="qty-val" id="qty-${p.id}">1</span>
                        <button class="qty-btn" onclick="updateQty(${p.id}, 1)">+</button>
                    </div>

                    <div class="btns">
                        <button class="btn-add" onclick="addToCart(${p.id})">أضف للسلة</button>
                        <button class="btn-info" onclick="showDetails('${p.name}', '${p.desc}')">التفاصيل</button>
                    </div>
                </div>
            `;
        });

        function updateQty(id, change) {
            let el = document.getElementById(`qty-${id}`);
            let current = parseInt(el.innerText);
            if (current + change >= 1) el.innerText = current + change;
        }

        function openZoom(src) {
            document.getElementById('zoomed-img').src = src;
            document.getElementById('zoom-modal').style.display = 'flex';
        }

        function showDetails(name, desc) {
            document.getElementById('m-title').innerText = name;
            document.getElementById('m-desc').innerText = desc;
            document.getElementById('details-modal').style.display = 'flex';
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const qty = parseInt(document.getElementById(`qty-${productId}`).innerText);
            
            for(let i=0; i<qty; i++) { cart.push(product); }
            
            document.getElementById('cart-bar').style.display = 'flex';
            updateCartBar();
            document.getElementById(`qty-${productId}`).innerText = "1"; // إعادة التصغير بعد الإضافة
        }

        function clearCart() {
            if(confirm("هل تريد تصفير السلة؟")) {
                cart = [];
                document.getElementById('cart-bar').style.display = 'none';
                updateCartBar();
            }
        }

        function updateCartBar() {
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            document.getElementById('cart-info').innerText = `القطع: ${cart.length} | المجموع: ${total} ر.س`;
        }

        function sendWhatsApp() {
            let summary = {};
            cart.forEach(p => summary[p.name] = (summary[p.name] || 0) + 1);
            let message = "أهلاً عزوة، طلب جديد:\n";
            for (let name in summary) { message += `- ${name} (الكمية: ${summary[name]})\n`; }
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            message += `\n💰 الإجمالي: ${total} ر.س`;
            window.open(`https://wa.me/966502777884?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
