<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عضوية EZWA VIP</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="https://media.zid.store/b35aeefa-f017-4ef5-ae8e-c4d132cb202b/2708f463-deda-4440-aac3-6ce260b5beab-200x.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://media.zid.store/b35aeefa-f017-4ef5-ae8e-c4d132cb202b/2708f463-deda-4440-aac3-6ce260b5beab-200x.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://media.zid.store/b35aeefa-f017-4ef5-ae8e-c4d132cb202b/2708f463-deda-4440-aac3-6ce260b5beab-200x.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Montserrat', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card-container {
            width: 100%;
            max-width: 380px;
            background: linear-gradient(135deg, #111111 0%, #000000 100%);
            border: 1px solid #c5a880; /* إطار ذهبي نحيف يعكس هوية البراند الملكية */
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        /* تأثير إضاءة خلفية ذهبية ناعمة لمنح الكرت فخامة إضافية */
        .card-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(197,168,128,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 60px;
        }

        .brand-name {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffffff;
        }

        .tier-badge {
            font-size: 11px;
            background-color: #c5a880;
            color: #000000;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .card-body {
            margin-bottom: 40px;
        }

        .user-name {
            font-size: 20px;
            font-weight: 400;
            color: #ffffff;
            margin-bottom: 8px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .membership-number {
            font-size: 14px;
            color: #c5a880;
            letter-spacing: 1px;
        }

        .card-footer {
            border-top: 1px solid rgba(197, 168, 128, 0.2);
            padding-top: 20px;
            display: flex;
            justify-content: space-around;
        }

        .action-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #888888;
            transition: color 0.3s ease;
        }

        .action-button:hover {
            color: #c5a880;
        }

        .action-button svg {
            width: 24px;
            height: 24px;
            margin-bottom: 6px;
            fill: currentColor;
        }

        .action-button span {
            font-size: 11px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card-header">
            <div class="brand-name">EZWA</div>
            <div class="tier-badge">أركان وعزوة</div>
        </div>
        
        <div class="card-body">
            <div class="user-name">محمد نبيل محمد</div>
            <div class="membership-number">001 - 2026</div>
        </div>
        
        <div class="card-footer">
            <a href="tel:+966502777884" class="action-button">
                <svg viewBox="0 0 24 24">
                    <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 0 0-1.01.24l-2.2 2.2a15.045 15.045 0 0 1-6.59-6.59l2.2-2.21a.96.96 0 0 0 .25-1.02c-.36-1.11-.56-2.3-.56-3.53C8.37 3.45 7.92 3 7.37 3H3.63c-.55 0-1 .45-1 1C2.63 14.38 10.62 22 20.37 22c.55 0 1-.45 1-1v-3.62c0-.55-.45-.99-1-.99z"/>
                </svg>

</body>
</html>
