<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA VIP CARD - PILLARS</title>
    <style>
        body { background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-container { 
            width: 350px; height: 210px; 
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%); 
            border: 1px solid #D4AF37; border-radius: 16px; 
            position: relative; padding: 20px; box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.2);
            overflow: hidden;
        }
        /* الشريحة الذهبية */
        .chip { width: 45px; height: 35px; background: linear-gradient(135deg, #D4AF37 0%, #F5E0A3 100%); border-radius: 6px; position: absolute; top: 75px; right: 25px; opacity: 0.9; }
        
        .brand-name { font-size: 1.3rem; color: #D4AF37; font-weight: 900; letter-spacing: -1px; position: absolute; top: 20px; right: 20px; text-transform: uppercase; }
        .member-id { position: absolute; top: 25px; left: 25px; color: #D4AF37; font-size: 0.7rem; font-weight: bold; letter-spacing: 1px; }
        
        .label { color: #888; font-size: 0.65rem; margin-top: 85px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .member-name { color: #fff; font-size: 1.2rem; margin-top: 2px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        .footer-note { position: absolute; bottom: 65px; left: 25px; color: #D4AF37; font-size: 0.55rem; font-weight: bold; opacity: 0.8; }

        .actions { position: absolute; bottom: 20px; left: 20px; right: 20px; display: flex; gap: 10px; }
        .btn { flex: 1; text-align: center; padding: 8px; border-radius: 8px; text-decoration: none; font-size: 0.75rem; font-weight: bold; transition: 0.3s; }
        .btn-call { background: #D4AF37; color: #000; }
        .btn-wa { border: 1px solid #444; color: #fff; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="brand-name">EZWA</div>
        <div class="member-id" id="vip-no">VIP #00/20</div>
        
        <div class="chip"></div> <div class="label">عضوية أركان عزوة</div>
        <div class="member-name" id="name-field">جاري التحميل...</div>
        
        <div class="footer-note">EXCLUSIVE ACCESS • EST. 2026</div>

        <div class="actions">
            <a href="tel:966502777884" class="btn btn-call">اتصال مباشر</a>
            <a href="https://wa.me/966502777884" class="btn btn-wa">واتساب</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let customerName = urlParams.get('name') || "نبيـل محمـد";
        let customerNo = urlParams.get('no') || "01";

        // تنظيف الاسم من أي رموز زائدة
        customerName = decodeURIComponent(customerName).replace(/[+_=]/g, ' ');

        document.getElementById('name-field').innerText = customerName;
        document.getElementById('vip-no').innerText = "VIP #" + customerNo + "/20";
    </script>

</body>
</html>
