<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA VIP CARD - PILLARS</title>
    <style>
        body { background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-container { 
            width: 350px; height: 210px; 
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%); 
            border: 1px solid #D4AF37; border-radius: 16px; 
            position: relative; padding: 20px; box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.2);
        }
        
        /* القسم المرتب جهة اليسار - كل الكتابة بالذهبي */
        .info-section { position: absolute; top: 20px; left: 20px; text-align: left; direction: ltr; }
        .member-name { color: #D4AF37; font-size: 1.1rem; font-weight: bold; margin-bottom: 2px; display: block; }
        .member-id { color: #D4AF37; font-size: 0.75rem; font-weight: bold; display: block; margin-bottom: 2px; }
        .label { color: #D4AF37; font-size: 0.6rem; font-weight: bold; text-transform: uppercase; display: block; opacity: 0.8; }

        /* البراند والشريحة */
        .brand-name { font-size: 1.3rem; color: #D4AF37; font-weight: 900; letter-spacing: -1.5px; position: absolute; top: 20px; right: 20px; text-transform: uppercase; }
        .chip { width: 42px; height: 32px; background: linear-gradient(135deg, #D4AF37 0%, #F5E0A3 100%); border-radius: 6px; position: absolute; top: 70px; right: 20px; opacity: 0.9; }
        
        .footer-note { position: absolute; bottom: 65px; left: 20px; color: #D4AF37; font-size: 0.55rem; font-weight: bold; opacity: 0.6; }

        .actions { position: absolute; bottom: 20px; left: 20px; right: 20px; display: flex; gap: 10px; }
        .btn { flex: 1; text-align: center; padding: 8px; border-radius: 8px; text-decoration: none; font-size: 0.75rem; font-weight: bold; }
        .btn-call { background: #D4AF37; color: #000; }
        .btn-wa { border: 1px solid #D4AF37; color: #D4AF37; background: rgba(212, 175, 55, 0.05); }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="info-section">
            <span class="member-name" id="name-field">جاري التحميل...</span>
            <span class="member-id" id="vip-no">VIP #00/20</span>
            <span class="label">فئة أركان عزوة</span>
        </div>

        <div class="brand-name">EZWA</div>
        <div class="chip"></div>
        
        <div class="footer-note">EXCLUSIVE ACCESS • EST. 2026</div>

        <div class="actions">
            <a href="tel:966502777884" class="btn btn-call">اتصال مباشر</a>
            <a href="https://wa.me/966502777884" class="btn btn-wa">واتساب</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let customerName = urlParams.get('name') || "نبيـل محمـد";
        let customerNo = urlParams.get('no') || "01";

        customerName = decodeURIComponent(customerName).replace(/[+_=]/g, ' ');

        document.getElementById('name-field').innerText = customerName;
        document.getElementById('vip-no').innerText = "VIP #" + customerNo + "/20";
    </script>

</body>
</html>
