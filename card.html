<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWA VIP CARD</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="https://media.zid.store/b35aeefa-f017-4ef5-ae8e-c4d132cb202b/2708f463-deda-4440-aac3-6ce260b5beab-200x.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://media.zid.store/b35aeefa-f017-4ef5-ae8e-c4d132cb202b/2708f463-deda-4440-aac3-6ce260b5beab-200x.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://media.zid.store/b35aeefa-f017-4ef5-ae8e-c4d132cb202b/2708f463-deda-4440-aac3-6ce260b5beab-200x.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .card-container {
            width: 100%;
            max-width: 380px;
            height: auto;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            border: 1px solid #D4AF37;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.2);
            position: relative;
            color: #fff;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .brand-name {
            font-size: 26px;
            font-weight: 700;
            color: #D4AF37;
            letter-spacing: 1px;
        }

        .chip {
            width: 45px;
            height: 35px;
            background: linear-gradient(135deg, #e5c060 0%, #b88d2f 100%);
            border-radius: 6px;
        }

        .card-body {
            margin-bottom: 40px;
        }

        .user-name {
            font-size: 22px;
            font-weight: bold;
            color: #D4AF37;
            margin-bottom: 8px;
        }

        .membership-number {
            font-size: 15px;
            color: #D4AF37;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .tier-text {
            font-size: 13px;
            color: #c5a880;
            font-weight: bold;
        }

        .exclusive-text {
            font-size: 10px;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .card-footer {
            display: flex;
            gap: 12px;
            justify-content: space-between;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-call {
            background-color: #D4AF37;
            color: #000;
        }

        .btn-whatsapp {
            background-color: transparent;
            color: #D4AF37;
            border: 1px solid #D4AF37;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card-header">
            <div class="chip"></div>
            <div class="brand-name">EZWA</div>
        </div>
        
        <div class="card-body">
            <div class="user-name" id="customer-name">جاري التحميل...</div>
            <div class="membership-number" id="card-number">VIP #000-2026/20</div>
            <div class="tier-text">فئة أركان عزوة</div>
        </div>
        
        <div class="exclusive-text">EXCLUSIVE ACCESS • EST. 2026</div>
        
        <div class="card-footer">
            <a href="https://wa.me/966502777884" target="_blank" class="btn btn-whatsapp">واتساب</a>
            <a href="tel:+966502777884" class="btn btn-call">اتصال مباشر</a>
        </div>
    </div>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const nameParam = getQueryParam('name');
        const noParam = getQueryParam('no');

        if (nameParam) {
            document.getElementById('customer-name').innerText = decodeURIComponent(nameParam);
        } else {
            document.getElementById('customer-name').innerText = "عميل مميز";
        }

        if (noParam) {
            document.getElementById('card-number').innerText = "VIP #" + decodeURIComponent(noParam) + "-2026/20";
        }
    </script>

</body>
</html>
